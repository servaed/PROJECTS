        <div className=${accentClass} style=${{

          borderRadius:'3px 14px 14px 14px',
          padding:'13px 17px',
          transition:'border-color 0.3s, border-left-color 0.4s',
        }}>
          ${msg.error
            ? html`<div style=${{ color:'var(--err)', fontSize:'0.84rem' }}>⚠ ${msg.error}</div>`
            : html`
              ${msg.isThinking && html`
                <div style=${{ fontSize:'0.75rem', color:'var(--t3)', fontStyle:'italic',
                  marginBottom:'6px', display:'flex', alignItems:'center', gap:'6px' }}>
                  <div className="spin" style=${{ width:'10px', height:'10px', borderWidth:'1.5px' }}/>

                </div>
              `}
              ${msg.isStreaming && !msg.content && !msg.isThinking && html`
                <div style=${{ display:'flex', gap:'6px', alignItems:'center', padding:'2px 0' }}>
                  ${[0,1,2].map(function(i) {
                    return html`<div key=${i} className="dot" style=${{ width:'7px', height:'7px', borderRadius:'50%', background:'var(--dot-color)', animationDelay:(i*0.18)+'s' }}/>`;

                : html`<${RawSourceView} msg=${msg}/>`

              ${msg.isStreaming && !msg.isThinking && msg.content && html`<span className="cursor"/>`}

          ${!msg.isStreaming && !msg.error && msg.content && html`
            <div style=${{ display:'flex', justifyContent:'flex-end', gap:'5px', marginTop:'8px', flexWrap:'wrap' }}>
              ${hasDocCits && html`
                <div className="view-toggle">
                  <button className=${'view-btn' + (viewMode==='ai'?' active':'')} onClick=${function(){setViewMode('ai');}}>AI Answer</button>
                  <button className=${'view-btn' + (viewMode==='raw'?' active':'')} onClick=${function(){setViewMode('raw');}}>Raw Source</button>

              <div style=${{ display:'flex', gap:'5px', marginLeft:'auto' }}>
                ${hasCits && html`
                  <button onClick=${copyWithSources} title="Copy with sources"
                    style=${{ background:'transparent', border:'1px solid var(--border)', borderRadius:'5px', padding:'3px 7px', color: copiedFull ? 'var(--teal)' : 'var(--t3)', fontSize:'0.65rem', display:'flex', alignItems:'center', gap:'4px', cursor:'pointer', transition:'all 0.15s', opacity:0.7, whiteSpace:'nowrap' }}
                    onMouseEnter=${function(e){ e.currentTarget.style.opacity='1'; e.currentTarget.style.borderColor='var(--teal)'; }}
                    onMouseLeave=${function(e){ e.currentTarget.style.opacity='0.7'; e.currentTarget.style.borderColor='var(--border)'; }}>
                    <${IcoCopy}/>${copiedFull ? ' Copied!' : ' + Sources'}
                  </button>
                `}
                <button onClick=${copyAnswer} title="Copy answer"
                  style=${{ background:'transparent', border:'1px solid var(--border)', borderRadius:'5px', padding:'3px 7px', color: copied ? 'var(--teal)' : 'var(--t3)', fontSize:'0.65rem', display:'flex', alignItems:'center', gap:'4px', cursor:'pointer', transition:'all 0.15s', opacity:0.7 }}
                  onMouseEnter=${function(e){ e.currentTarget.style.opacity='1'; e.currentTarget.style.borderColor='var(--orange)'; }}
                  onMouseLeave=${function(e){ e.currentTarget.style.opacity='0.7'; e.currentTarget.style.borderColor='var(--border)'; }}>
                  <${IcoCopy}/>${copied ? ' Copied' : ' Copy'}
                </button>
              </div>
            </div>
            ${msg.suggestions && msg.suggestions.length > 0 && html`
              <${FollowupSuggestions} suggestions=${msg.suggestions} onPick=${props.onPick}/>
            `}
          `}
        </div>
        ${hasCits && !msg.isStreaming && viewMode === 'ai' && html`
          <div style=${{ marginTop:'10px', paddingLeft:'2px' }}>
            ${msg.docCitations && msg.docCitations.length > 0 && html`
              <${DocCitationList} citations=${msg.docCitations} question=${msg.question}/>
            `}
            ${msg.sqlCitation && html`
              <div style=${{ marginTop:(msg.docCitations && msg.docCitations.length ? 8 : 0)+'px' }}>
                <${SqlPanel} sc=${msg.sqlCitation}/>
              </div>
            `}
          </div>
        `}
        ${!msg.isStreaming && !msg.error && (msg.usage || msg.latency_ms) && html`
          <div style=${{
            marginTop:'6px', paddingLeft:'2px',
            fontSize:'0.62rem', color:'var(--t3)',
            display:'flex', alignItems:'center', gap:'10px', opacity:0.7,
          }}>
            ${msg.latency_ms != null && html`
              <span title="Total response time" style=${{ color:'var(--ok)', fontFamily:'var(--mono)', fontWeight:600 }}>
                ⚡ ${(msg.latency_ms / 1000).toFixed(1)}s

            ${msg.usage && html`
              <span title="Estimated token usage (1 token ≈ 4 chars)">
                ≈ ${msg.usage.input_tokens.toLocaleString()} in · ${msg.usage.output_tokens.toLocaleString()} out · ${msg.usage.total_tokens.toLocaleString()} total tokens
              </span>
            `}
          </div>
        `}
      </div>`;
  }

      var t = (text || '').toLowerCase();

      if (/sesuai|kebijakan|policy|regulasi|ketentuan|prosedur|apakah|comply|target|berdasarkan/.test(t) && /berapa|total|jumlah|ranking|nilai/.test(t)) return 'combined';

              ${topSamples.map(function(s, i) {
                var text = typeof s === 'string' ? s : s.text;
                var mode = (typeof s === 'object' && s.mode) ? s.mode : inferMode(text);
                var m = getMode(mode);
                var pillClass = mode === 'document' ? 'prompt-pill pp-doc' : mode === 'data' ? 'prompt-pill pp-data' : 'prompt-pill pp-comb';
                return html`
                  <button
                    key=${i}
                    onClick=${function() { if (props.onPick) props.onPick(text); }}
                    style=${{
                      width:'100%', padding:'11px 14px', borderRadius:'11px',
                      background:'var(--surface)', border:'1px solid var(--border)',
                      color:'var(--t1)', fontSize:'0.83rem', textAlign:'left',
                      cursor:'pointer', transition:'border-color 0.15s, background 0.15s, box-shadow 0.15s',
                      boxShadow:'0 1px 3px rgba(0,0,0,0.05)',
                      display:'flex', alignItems:'center', gap:'10px',
                    }}
                    onMouseEnter=${function(e){
                      e.currentTarget.style.borderColor='var(--orange)';
                      e.currentTarget.style.background='var(--o-dim)';
                      e.currentTarget.style.boxShadow='0 2px 12px rgba(249,103,2,0.12)';
                      var pill = e.currentTarget.querySelector('.prompt-pill');
                      if(pill) pill.style.opacity='1';
                    }}
                    onMouseLeave=${function(e){
                      e.currentTarget.style.borderColor='var(--border)';
                      e.currentTarget.style.background='var(--surface)';
                      e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,0.05)';
                      var pill = e.currentTarget.querySelector('.prompt-pill');
                      if(pill) pill.style.opacity='0';
                    }}
                  >
                    <span style=${{ color:m.color, fontSize:'0.85rem', flexShrink:0, lineHeight:1 }}>${m.icon}</span>
                    <span style=${{ flex:1, lineHeight:1.5 }}>${text.length > 85 ? text.slice(0,84)+'…' : text}</span>
                    <span className=${pillClass} style=${{ opacity:0, transition:'opacity 0.15s' }}>
                      ${mode === 'document' ? '◈ Policy' : mode === 'data' ? '⬡ Data' : '⚡ Insight'}
                    </span>
                  </button>`;
              })}
            </div>
          `}

          <!-- Capability pills -->
          <div style=${{ display:'flex', gap:'6px', flexWrap:'wrap', justifyContent:'center' }}>
            ${[
              { icon:'◈', color:'var(--teal)',   text:'Document RAG',    dim:'var(--t-dim)' },
              { icon:'⬡', color:'var(--indigo)', text:'Structured Data', dim:'var(--i-dim)' },
              { icon:'⚡', color:'var(--orange)', text:'Combined',        dim:'var(--o-dim)' },
            ].map(function(p) {
              return html`
                <div key=${p.text} style=${{
                  display:'flex', alignItems:'center', gap:'5px',
                  padding:'5px 13px', borderRadius:'20px',
                  background:p.dim, border:'1px solid '+p.color+'30',
                  fontSize:'0.74rem', color:p.color, fontWeight:600,
                }}>
                  <span>${p.icon}</span>
                  <span>${p.text}</span>

          <!-- Quick links -->
          <div style=${{ display:'flex', gap:'8px', flexWrap:'wrap', justifyContent:'center' }}>

                  </div>
                  <span style=${{ color:'var(--t3)', fontSize:'0.8rem', marginLeft:'4px' }}>→</span>
                </a>`;
            })}
          </div>
        </div>
      </div>`;
  }

  // ── Chat window ────────────────────────────────────────────────────

      if (endRef.current) endRef.current.scrollIntoView({ behavior:'smooth' });

    if (!props.msgs.length) return html`<${Welcome} domain=${props.domain} samples=${props.samples} onPick=${props.onPick}/>`;

        ${props.isLoading

  // ── Input bar ──────────────────────────────────────────────────────
  function InputBar(props) {
    const [val, setVal] = useState('');
    const taRef         = useRef(null);

    useEffect(function() {
      if (props.prefill) {
        setVal(props.prefill); props.onPrefillDone();
        if (taRef.current) taRef.current.focus();
      }
    }, [props.prefill]);

    useEffect(function() {
      var ta = taRef.current;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(Math.max(ta.scrollHeight, 38), 160) + 'px';
    }, [val]);

    function submit() {
      var q = val.trim();
      if (!q || props.disabled) return;
      setVal('');
      if (taRef.current) taRef.current.style.height = 'auto';
      props.onSubmit(q);
    }

    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    }

    var active = val.trim() !== '' && !props.disabled;

    return html`
      <div style=${{
        padding:'16px 36px 20px',
        borderTop:'1px solid var(--border)',
        background:'var(--surface)',
        boxShadow:'0 -6px 24px rgba(0,0,0,0.06)',
        flexShrink:0,
      }}>
        <div
          style=${{
            display:'flex', alignItems:'center', gap:'10px',
            background:'var(--inp-bg)',
            border:'1px solid var(--inp-bd)',
            borderRadius:'14px', padding:'12px 12px 12px 18px',
            transition:'border-color 0.2s, box-shadow 0.2s',
            boxShadow:'0 2px 8px rgba(0,0,0,0.05)',
          }}
          onFocusCapture=${function(e) {
            e.currentTarget.style.borderColor = 'var(--orange)';
            e.currentTarget.style.boxShadow   = '0 0 0 3px var(--o-dim)';
          }}
          onBlurCapture=${function(e) {
            e.currentTarget.style.borderColor = 'var(--inp-bd)';
            e.currentTarget.style.boxShadow   = 'var(--msg-a-shadow)';
          }}
        >
          <textarea
            ref=${taRef}
            value=${val}
            onInput=${function(e) { setVal(e.target.value); }}
            onKeyDown=${onKey}
            placeholder="Ask about your enterprise documents and data…"
            disabled=${props.disabled}
            rows="1"
            style=${{
              flex:1, background:'transparent', border:'none', outline:'none',
              resize:'none', overflowY:'hidden', minHeight:'38px',
              color:'var(--t1)', fontSize:'0.875rem', lineHeight:1.65,
            }}
          />
          <button
            onClick=${submit}
            disabled=${!active}
            style=${{
              flexShrink:0, width:'34px', height:'34px',
              borderRadius:'8px', border:'none',
              background: active ? 'var(--orange)' : 'var(--s3)',
              color: active ? '#fff' : 'var(--t3)',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.15s',
              boxShadow: active ? '0 2px 8px var(--o-glow)' : 'none',
              cursor: props.disabled ? 'not-allowed' : (active ? 'pointer' : 'default'),
              opacity: props.disabled ? 0.55 : 1,
            }}
          >${props.disabled ? html`<div className="spin"/>` : html`<${IcoSend}/>`}</button>
        </div>
        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:'6px' }}>
          <div style=${{ fontSize:'0.62rem', color:'var(--t3)' }}>
            Enter to send · Shift+Enter new line · Ctrl+K clear
          </div>
          <div style=${{ display:'flex', gap:'6px' }}>
            <button
              className=${'agent-toggle' + (props.thinkMode ? ' think-on' : '')}
              onClick=${props.onToggleThink}
              title=${props.thinkMode ? 'Reasoning ON — model shows chain of thought. Click to disable.' : 'Enable Reasoning — see model\'s thinking process'}
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              ${props.thinkMode ? 'Think ON' : 'Think'}
            </button>
            <button
              className=${'agent-toggle' + (props.debateMode ? ' debate-on' : '')}
              onClick=${props.onToggleDebate}
              title=${props.debateMode ? 'Debate mode ON — Researcher + Critic. Click to disable.' : 'Enable Debate mode — AI Researcher challenges AI Critic for balanced answers'}
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              ${props.debateMode ? 'Debate ON' : 'Debate'}
            </button>
            <button
              className=${'agent-toggle' + (props.agentMode ? ' agent-on' : '')}
              onClick=${props.onToggleAgent}
              title=${props.agentMode ? 'Agent mode ON — multi-step research. Click to disable.' : 'Enable Agent mode — breaks complex questions into research steps'}
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              ${props.agentMode ? 'Agent ON' : 'Agent'}
            </button>
          </div>
        </div>
      </div>`;
  }

  // ── App root ───────────────────────────────────────────────────────
  function App() {
    var _SS_KEY = 'cld-chat';
    var _SS_VER = 3;   // bump when message shape changes to avoid corrupt history
    const [msgs, dispatch]              = useReducer(reduce, [], function() {
      try {
        var raw = localStorage.getItem(_SS_KEY);
        if (raw) {
          var stored = JSON.parse(raw);
          // Reject storage written by an older schema version
          if (!stored || stored._v !== _SS_VER || !Array.isArray(stored.msgs)) return [];
          // Ensure no message is left mid-stream after a page reload
          return stored.msgs.map(function(m) {
            return m.isStreaming ? Object.assign({},m,{isStreaming:false,isThinking:false}) : m;
          });
        }
      } catch(e) {}
      return [];
    });
    const [status, setStatus]           = useState(null);
    const [samples, setSamples]         = useState([]);
    const [loading, setLoading]         = useState(false);
    const [prefill, setPrefill]         = useState(null);
    const [theme, setTheme]             = useState(getTheme);
    const [domain, setDomain]           = useState('banking');
    const [language, setLanguage]       = useState('id');
    const [domains, setDomains]         = useState([
      {id:'banking',label:'Banking'},{id:'telco',label:'Telco'},{id:'government',label:'Government'}
    ]);
    const [showSetupOverlay, setShowSetupOverlay] = useState(false);
    const [sidebarOpen, setSidebarOpen]       = useState(false);
    const [topbarScrolled, setTopbarScrolled] = useState(false);
    const [citPanelMsg,  setCitPanelMsg]      = useState(null);
    const chatScrollRef = useRef(null);
    const [persona, setPersona]         = useState(null);
    const [answerStyle, setAnswerStyle] = useState('analyst');
    const answerStyleRef = useRef('analyst');
    const [agentMode, setAgentMode]       = useState(false);
    const agentModeRef  = useRef(false);
    const [thinkMode, setThinkMode]       = useState(false);
    const thinkModeRef  = useRef(false);
    const [debateMode, setDebateMode]     = useState(false);
    const debateModeRef = useRef(false);
    const [isAutoPlaying, setIsAutoPlaying]   = useState(false);
    const [isAutoPaused,  setIsAutoPaused]    = useState(false);
    const [autoPlayIdx,   setAutoPlayIdx]     = useState(0);
    // Refs so auto-play setTimeout callbacks always read latest state/fn
    const autoPlayRef     = useRef(false);
    const autoPausedRef   = useRef(false);
    const pausedAtIdxRef  = useRef(0);
    const playNextRef     = useRef(null);
    const samplesRef      = useRef([]);
    const handleSubmitRef = useRef(null);
    const domainRef       = useRef(domain);
    const languageRef     = useRef(language);

    // Apply theme to <html> whenever it changes
    useEffect(function() { setThemeAttr(theme); }, [theme]);

    // Persist chat to localStorage so conversations survive tab close and reload
    useEffect(function() {
      try { localStorage.setItem(_SS_KEY, JSON.stringify({_v: _SS_VER, msgs: msgs})); } catch(e) {}
    }, [msgs]);

    // Keep refs in sync
    useEffect(function() { samplesRef.current = samples; }, [samples]);
    useEffect(function() { domainRef.current = domain; }, [domain]);
    useEffect(function() { languageRef.current = language; }, [language]);
    useEffect(function() { answerStyleRef.current = answerStyle; }, [answerStyle]);
    useEffect(function() { agentModeRef.current  = agentMode;  }, [agentMode]);
    useEffect(function() { thinkModeRef.current  = thinkMode;  }, [thinkMode]);
    useEffect(function() { debateModeRef.current = debateMode; }, [debateMode]);

    // Persona selection: set domain + language + greeting message
    function selectPersona(p) {
      setPersona(p);
      if (!p) return;
      setDomain(p.domain);
      setLanguage(p.lang);
      stopAutoPlay();
      dispatch({ type:'RESET' });
      try { localStorage.removeItem(_SS_KEY); } catch(e) {}
      setTimeout(function() {
        var gid = Date.now();
        dispatch({ type:'PERSONA_MSG', id:gid, content:p.greeting });
      }, 100);
    }

    // Story arc: set domain + language + queue questions as auto-play
    function startStoryArc(arc) {
      setDomain(arc.domain);
      setLanguage(arc.lang);
      stopAutoPlay();
      dispatch({ type:'RESET' });
      try { localStorage.removeItem(_SS_KEY); } catch(e) {}
      // Override samplesRef temporarily for this arc
      samplesRef.current = arc.questions;
      setTimeout(function() { startAutoPlay(); }, 150);
    }

    // On first load: redirect to /configure?setup=1 if LLM is not configured
    useEffect(function() {
      fetch('/health', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(h) {
          if (h.checks && !h.checks.llm_configured) {
            window.location.href = '/configure?setup=1';
          }
        })
        .catch(function() {}); // silently ignore during startup
    }, []);

    // Fetch status and available domains; poll every 30s for sidebar indicators
    useEffect(function() {
      function ls() {
        fetch('/api/status').then(function(r){return r.json();}).then(function(s) {
          setStatus(s);
        }).catch(console.error);
      }
      fetch('/api/domains').then(function(r){return r.json();}).then(setDomains).catch(console.error);
      ls();
      var iv = setInterval(ls, 30000);
      return function() { clearInterval(iv); };
    }, []);

    // Re-fetch samples whenever domain or language changes; also reset auto-play
    useEffect(function() {
      stopAutoPlay();
      setSamples([]);
      fetch('/api/samples?domain='+domain+'&lang='+language)
        .then(function(r){return r.json();})
        .then(setSamples)
        .catch(console.error);
    }, [domain, language]);

    const handleSubmit = useCallback(function(question, _onDone) {
      var uid = Date.now();
      var aid = uid + 1;
      var t0  = Date.now();
      var history = msgs
        .filter(function(m) { return m.content; })
        .map(function(m) { return { role:m.role, content:m.content }; });

      dispatch({ type:'USER', id:uid, content:question });
      var isAgent  = agentModeRef.current;
      var isDebate = debateModeRef.current;
      var isThink  = thinkModeRef.current;
      if (isDebate) {
        dispatch({ type:'DEBATE_ASSISTANT', id:aid, question:question });
      } else if (isAgent) {
        dispatch({ type:'AGENT_ASSISTANT', id:aid, question:question });
      } else {
        dispatch({ type:'ASSISTANT', id:aid, question:question });
      }
      setLoading(true);

      var gotDone = false;
      var _mode = null;
      var _tMode = null;
      var _tFirstToken = null;
      async function run() {
        try {
          var endpoint = isDebate ? '/api/debate/chat' : isAgent ? '/api/agent/chat' : '/api/chat';
          for await (var ev of ssePost(endpoint, {
            question:question, history:history,
            domain:domainRef.current, language:languageRef.current,
            style:answerStyleRef.current,
            thinking: isThink,
          })) {
            // Debate-specific events
            if (ev.event==='debate_researcher_thinking') { setLoading(false); }
            if (ev.event==='debate_researcher_done') { dispatch({ type:'DEBATE_RESEARCHER_DONE', id:aid, text:ev.data.text }); }
            if (ev.event==='debate_critic_start')    { dispatch({ type:'DEBATE_CRITIC_START',    id:aid }); }
            if (ev.event==='debate_critic_token')    { dispatch({ type:'DEBATE_CRITIC_TOKEN',    id:aid, text:ev.data.text }); }
            if (ev.event==='debate_synthesis_start') { dispatch({ type:'DEBATE_SYNTH_START',     id:aid }); }
            // Thinking / Reasoning events
            if (ev.event==='thinking_token') { dispatch({ type:'THINKING_TOKEN', id:aid, text:ev.data.text }); }
            // Agent-specific events
            if (ev.event==='agent_thinking') { /* shows in AgentResearch via agentPhase */ }
            if (ev.event==='agent_plan')      { dispatch({ type:'AGENT_PLAN',       id:aid, steps:ev.data.steps }); setLoading(false); }
            if (ev.event==='agent_step_start'){ dispatch({ type:'AGENT_STEP_START', id:aid, index:ev.data.index }); }
            if (ev.event==='agent_step_done') { dispatch({ type:'AGENT_STEP_DONE',  id:aid, index:ev.data.index, summary:ev.data.summary, latency_ms:ev.data.latency_ms }); }
            if (ev.event==='agent_synthesis') { dispatch({ type:'AGENT_SYNTH',      id:aid }); }

            if (ev.event==='mode') {
              _mode = ev.data.mode; _tMode = Date.now();
              var routerMs = _tMode - t0;
              dispatch({ type:'MODE', id:aid, mode:ev.data.mode, _routerMs:routerMs });
              setLoading(false);
            }
            if (ev.event==='token') {
              if (!_tFirstToken) {
                _tFirstToken = Date.now();
                dispatch({ type:'TOKEN', id:aid, text:ev.data.text, _retrieveMs:_tFirstToken - (_tMode||t0) });
              } else {
                dispatch({ type:'TOKEN', id:aid, text:ev.data.text });
              }
            }
            if (ev.event==='thinking') { dispatch({ type:'THINKING', id:aid, active:ev.data.active }); }
            if (ev.event==='done')     {
              var totalMs = Date.now() - t0;
              dispatch({ type:'DONE', id:aid, docCitations:ev.data.doc_citations, sqlCitation:ev.data.sql_citation, usage:ev.data.usage||null, latency_ms:totalMs });
              gotDone=true;
              // Fetch follow-up suggestions in background (non-blocking)
              if (ev.data.doc_citations && ev.data.doc_citations.length || ev.data.sql_citation) {
                fetch('/api/followup', {
                  method:'POST', headers:{'Content-Type':'application/json'},
                  body:JSON.stringify({ question:question, answer:'', mode:_mode||'document', domain:domainRef.current, language:languageRef.current }),
                }).then(function(r){return r.json();}).then(function(d){
                  if (d.suggestions && d.suggestions.length) {
                    dispatch({ type:'SUGGESTIONS', id:aid, suggestions:d.suggestions });
                  }
                }).catch(function(){});
              }
            }
            if (ev.event==='error')    { dispatch({ type:'ERROR', id:aid, message:ev.data.message }); gotDone=true; }
          }
        } catch(err) {
          dispatch({ type:'ERROR', id:aid, message:err.message });
        } finally {
          if (!gotDone) dispatch({ type:'DONE', id:aid, docCitations:[], sqlCitation:null });
          setLoading(false);
          if (_onDone) _onDone();
        }
      }
      run();
    }, [msgs]);

    // Keep handleSubmitRef in sync — useCallback rebuilds when msgs changes,
    // so auto-play callbacks must reference this ref to avoid stale closures
    useEffect(function() { handleSubmitRef.current = handleSubmit; }, [handleSubmit]);

    // ── Auto-play: run every sample prompt sequentially ───────────────
    function startAutoPlay() {
      if (!samplesRef.current.length || autoPlayRef.current) return;
      autoPlayRef.current   = true;
      autoPausedRef.current = false;
      setIsAutoPlaying(true);
      setIsAutoPaused(false);
      setAutoPlayIdx(0);

      function playNext(idx) {
        if (!autoPlayRef.current) return;
        var samps = samplesRef.current;
        if (idx >= samps.length) {
          autoPlayRef.current = false;
          setIsAutoPlaying(false);
          setIsAutoPaused(false);
          return;
        }
        setAutoPlayIdx(idx);
        var q = typeof samps[idx] === 'string' ? samps[idx] : samps[idx].text;
        handleSubmitRef.current(q, function() {
          if (!autoPlayRef.current) return;
          if (autoPausedRef.current) { pausedAtIdxRef.current = idx + 1; return; }
          // Brief pause between questions so the audience can read each answer
          setTimeout(function() { playNext(idx + 1); }, 3000);
        });
      }

      playNextRef.current = playNext;
      playNext(0);
    }

    function pauseAutoPlay() {
      autoPausedRef.current = true;
      setIsAutoPaused(true);
    }

    function resumeAutoPlay() {
      if (!autoPlayRef.current || !autoPausedRef.current) return;
      autoPausedRef.current = false;
      setIsAutoPaused(false);
      if (playNextRef.current) playNextRef.current(pausedAtIdxRef.current);
    }

    function stopAutoPlay() {
      autoPlayRef.current   = false;
      autoPausedRef.current = false;
      setIsAutoPlaying(false);
      setIsAutoPaused(false);
    }

    function restartAutoPlay() {
      // Stop any running demo, clear history, restart from question 1.
      autoPlayRef.current   = false;
      autoPausedRef.current = false;
      setIsAutoPlaying(false);
      setIsAutoPaused(false);
      dispatch({ type:'RESET' });
      try { localStorage.removeItem(_SS_KEY); } catch(err) {}
      // Small delay so the RESET render settles before starting playback.
      setTimeout(startAutoPlay, 80);
    }

    // Glassmorphism: watch chat scroll position
    useEffect(function() {
      var el = chatScrollRef.current;
      if (!el) return;
      function onScroll() { setTopbarScrolled(el.scrollTop > 20); }
      el.addEventListener('scroll', onScroll, { passive: true });
      return function() { el.removeEventListener('scroll', onScroll); };
    }, []);

    // ── Keyboard shortcuts ────────────────────────────────────────────
    useEffect(function() {
      function onKeyDown(e) {
        // Ctrl+Shift+D — toggle demo (start / stop auto-play)
        if (e.ctrlKey && e.shiftKey && e.key === 'D') {
          e.preventDefault();
          if (isAutoPlaying) stopAutoPlay(); else startAutoPlay();
        }
        // Ctrl+K — clear conversation
        if (e.ctrlKey && !e.shiftKey && (e.key === 'k' || e.key === 'K')) {
          e.preventDefault();
          stopAutoPlay();
          dispatch({ type:'RESET' });
          try { localStorage.removeItem(_SS_KEY); } catch(err) {}
        }
        // Ctrl+Shift+R — full demo restart (reset to banking/id and restart autoplay)
        if (e.ctrlKey && e.shiftKey && e.key === 'R') {
          e.preventDefault();
          setDomain('banking');
          setLanguage('id');
          restartAutoPlay();
        }
        // Escape — stop demo if playing
        if (e.key === 'Escape' && isAutoPlaying) {
          stopAutoPlay();
        }
      }
      window.addEventListener('keydown', onKeyDown);
      return function() { window.removeEventListener('keydown', onKeyDown); };
    }, [isAutoPlaying, isAutoPaused]);

    return html`
      <div style=${{ display:'flex', flexDirection:'column', width:'100vw', height:'100vh', overflow:'hidden' }}>
        <${SetupOverlay}
          show=${showSetupOverlay}
          onDismiss=${function() {
            setShowSetupOverlay(false);
            try { sessionStorage.setItem('cld-overlay-dismissed', '1'); } catch(e) {}
          }}
        />
        <!-- GCP-style top bar (full width) -->
        <${TopBar}
          theme=${theme}
          scrolled=${topbarScrolled}
          onToggle=${function() { setTheme(function(t){ return t==='dark'?'light':'dark'; }); }}
          onReset=${function() { stopAutoPlay(); dispatch({ type:'RESET' }); try { localStorage.removeItem(_SS_KEY); } catch(e){} }}
          domain=${domain}
          domains=${domains}
          onDomainChange=${function(d) { setDomain(d); }}
          language=${language}
          onLanguageChange=${function(l) { setLanguage(l); }}
          isAutoPlaying=${isAutoPlaying}
          isAutoPaused=${isAutoPaused}
          autoPlayIdx=${autoPlayIdx}
          autoPlayTotal=${samples.length}
          onStartAutoPlay=${startAutoPlay}
          onPauseAutoPlay=${pauseAutoPlay}
          onResumeAutoPlay=${resumeAutoPlay}
          onStopAutoPlay=${stopAutoPlay}
          onRestartAutoPlay=${restartAutoPlay}
          onToggleSidebar=${function(){ setSidebarOpen(function(v){ return !v; }); }}
          onExport=${msgs.length ? function(){ exportChat(msgs, domain, language); } : null}
        />

        <!-- Body: sidebar + main -->
        <div style=${{ flex:1, display:'flex', overflow:'hidden', position:'relative' }}>
          ${sidebarOpen && html`<div style=${{ position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:40 }} onClick=${function(){setSidebarOpen(false);}}/>`}
          <div className=${'sidebar-mobile-panel' + (sidebarOpen ? ' open' : '')} style=${{ height:'100%' }}>
          <${Sidebar}
            status=${status}
            samples=${samples}
            onPick=${function(p) { if (!isAutoPlaying && !loading) setPrefill(p); }}
            isAutoPlaying=${isAutoPlaying}
            isAutoPaused=${isAutoPaused}
            autoPlayIdx=${autoPlayIdx}
            autoPlayTotal=${samples.length}
            onStartAutoPlay=${startAutoPlay}
            onPauseAutoPlay=${pauseAutoPlay}
            onResumeAutoPlay=${resumeAutoPlay}
            onStopAutoPlay=${stopAutoPlay}
            domain=${domain}
            domains=${domains}
            language=${language}
            onDomainChange=${function(d) { setDomain(d); }}
            onLanguageChange=${function(l) { setLanguage(l); }}
            onFullReset=${function() {
              stopAutoPlay();
              setDomain('banking');
              setLanguage('id');
              dispatch({ type:'RESET' });
              try { localStorage.removeItem(_SS_KEY); } catch(e) {}
            }}
            persona=${persona}
            onPersonaSelect=${selectPersona}
            onStoryArc=${startStoryArc}
            answerStyle=${answerStyle}
            onStyleChange=${function(s) { setAnswerStyle(s); answerStyleRef.current = s; }}
          />
          </div>
          <!-- Main: chat + input -->
          <div style=${{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative' }}>
            <${ChatWindow}
              msgs=${msgs} isLoading=${loading} domain=${domain}
              samples=${samples}
              scrollRef=${chatScrollRef}
              onPick=${function(p) { if (!isAutoPlaying && !loading) setPrefill(p); }}
              onViewSources=${function(msg) { setCitPanelMsg(function(cur){ return cur && cur.id===msg.id ? null : msg; }); }}
            />
            <${InputBar}
              onSubmit=${handleSubmit}
              disabled=${loading || isAutoPlaying}
              prefill=${prefill}
              onPrefillDone=${function() { setPrefill(null); }}
              agentMode=${agentMode}
              thinkMode=${thinkMode}   onToggleThink=${function(){ setThinkMode(function(v){ thinkModeRef.current=!v; return !v; }); }}
              debateMode=${debateMode} onToggleDebate=${function(){ setDebateMode(function(v){ debateModeRef.current=!v; return !v; }); }}
              agentMode=${agentMode}   onToggleAgent=${function() { setAgentMode(function(v){ agentModeRef.current = !v; return !v; }); }}
            />
          </div>

          <!-- Citation slide panel (right side) -->
          <div className=${'cit-panel' + (citPanelMsg ? ' cit-open' : '')}>
            <div className="cit-panel-header">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="10" height="12" rx="1.5"/><path d="M6 6h4M6 9h3"/></svg>
              <span style=${{ fontSize:'0.8rem', fontWeight:600, color:'var(--t1)', flex:1 }}>Source Documents</span>
              <span style=${{ fontSize:'0.7rem', color:'var(--t3)', marginRight:'8px' }}>
                ${citPanelMsg && citPanelMsg.docCitations ? citPanelMsg.docCitations.length + ' found' : ''}
              </span>
              <button
                onClick=${function(){ setCitPanelMsg(null); }}
                style=${{ background:'none', border:'none', color:'var(--t3)', cursor:'pointer', padding:'2px', lineHeight:0 }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div className="cit-panel-body">
              ${citPanelMsg && citPanelMsg.docCitations && citPanelMsg.docCitations.map(function(c, i) {
                return html`<${DocCard} key=${i} cit=${c} idx=${i+1} query=${citPanelMsg.question || ''}/>`;
              })}
              ${citPanelMsg && (!citPanelMsg.docCitations || !citPanelMsg.docCitations.length) && html`
                <div style=${{ fontSize:'0.82rem', color:'var(--t3)', textAlign:'center', marginTop:'32px' }}>No document sources for this answer.</div>
              `}
            </div>
          </div>
        </div>
      </div>`;
  }

  createRoot(document.getElementById('root')).render(html`<${App}/>`);
})();
</script>
</body>
</html>

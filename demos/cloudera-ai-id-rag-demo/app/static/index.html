<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudera AI — Enterprise Assistant</title>

  <!-- Anti-FOUC: apply stored theme before first paint -->
  <script>
    (function(){
      var t = localStorage.getItem('cld-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Fonts: Google Fonts with local system-font fallback for offline use -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Google+Sans+Display:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Vendor JS — self-hosted for offline/restricted-network resilience -->
  <script src="/static/vendor/react.production.min.js"></script>
  <script src="/static/vendor/react-dom.production.min.js"></script>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/purify.min.js"></script>
  <script src="/static/vendor/htm.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── Design tokens — LIGHT (default) ───────────────────────────── */
    :root {
      /* Surfaces */
      --bg:          #F8F9FA;
      --surface:     #FFFFFF;
      --s2:          #F1F3F4;
      --s3:          #E8EAED;
      --s4:          #DADCE0;

      /* Borders */
      --border:      #DADCE0;
      --border-soft: rgba(0,0,0,0.06);

      /* Brand */
      --orange:      #F96702;
      --o-dim:       rgba(249,103,2,0.08);
      --o-glow:      rgba(249,103,2,0.18);
      --o-text:      #C94F00;        /* darker shade for light bg legibility */
      --teal:        #00796B;
      --t-dim:       rgba(0,121,107,0.08);
      --indigo:      #5C6BC0;
      --i-dim:       rgba(92,107,192,0.08);

      /* Text */
      --t1:          #202124;
      --t2:          #5F6368;
      --t3:          #9AA0A6;

      /* Status */
      --ok:          #34A853;
      --ok-glow:     rgba(52,168,83,0.4);
      --err:         #EA4335;
      --err-glow:    rgba(234,67,53,0.4);

      /* Chat messages */
      --msg-u-bg:    rgba(249,103,2,0.07);
      --msg-u-bd:    rgba(249,103,2,0.2);
      --msg-a-bg:    #FFFFFF;
      --msg-a-bd:    #DADCE0;
      --msg-a-shadow:0 1px 4px rgba(0,0,0,0.07);

      /* Input */
      --inp-bg:      #FFFFFF;
      --inp-bd:      #DADCE0;

      /* Code */
      --code-bg:     #F1F3F4;
      --code-color:  #C94F00;
      --pre-bg:      #F8F9FA;

      /* Sidebar data-color */
      --sql-color:   #5C6BC0;
      --sql-bd:      rgba(92,107,192,0.22);

      /* Logo filter — convert logo to Cloudera orange (#F96702) in light mode */
      --logo-filter: brightness(0) saturate(100%) invert(43%) sepia(97%) saturate(739%) hue-rotate(346deg) brightness(103%) contrast(103%);

      /* Thinking dots */
      --dot-color:   #9AA0A6;

      /* Topbar */
      --topbar-bg:   #FFFFFF;
      --topbar-bd:   #DADCE0;

      /* Sidebar */
      --sidebar-bg:  #FFFFFF;
      --sidebar-bd:  rgba(0,0,0,0.13);

      /* Prompt button */
      --prompt-hover-bg: rgba(249,103,2,0.07);
      --prompt-hover-bd: rgba(249,103,2,0.25);
      --prompt-hover-c:  #202124;

      /* Typography */
      --font:        'Google Sans', 'Plus Jakarta Sans', system-ui, sans-serif;
      --display:     'Google Sans Display', 'Google Sans', system-ui, sans-serif;
      --mono:        'JetBrains Mono', monospace;

      /* Layout */
      --topbar-h:    64px;
      --sidebar-w:   260px;
    }

    /* ── Design tokens — DARK ───────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:          #0D1117;
      --surface:     #161C27;
      --s2:          #1C2538;
      --s3:          #232E44;
      --s4:          #2C3A54;

      --border:      rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.04);

      --o-dim:       rgba(249,103,2,0.10);
      --o-glow:      rgba(249,103,2,0.22);
      --o-text:      #F96702;
      --teal:        #00A591;
      --t-dim:       rgba(0,165,145,0.09);
      --indigo:      #818CF8;
      --i-dim:       rgba(129,140,248,0.09);

      --t1:          #E8EDF5;
      --t2:          #8E9BB5;
      --t3:          #4A5470;

      --msg-u-bg:    rgba(249,103,2,0.10);
      --msg-u-bd:    rgba(249,103,2,0.22);
      --msg-a-bg:    #161C27;
      --msg-a-bd:    rgba(255,255,255,0.09);
      --msg-a-shadow:none;

      --inp-bg:      #0D1117;
      --inp-bd:      rgba(255,255,255,0.10);

      --code-bg:     #1C2538;
      --code-color:  #FF8533;
      --pre-bg:      #0D1117;

      --sql-color:   #818CF8;
      --sql-bd:      rgba(129,140,248,0.2);

      /* Same orange filter in dark mode — logo stays Cloudera orange */
      --logo-filter: brightness(0) saturate(100%) invert(43%) sepia(97%) saturate(739%) hue-rotate(346deg) brightness(103%) contrast(103%);

      --dot-color:   #4A5470;

      --topbar-bg:   #161C27;
      --topbar-bd:   rgba(255,255,255,0.08);

      --sidebar-bg:  #131921;
      --sidebar-bd:  rgba(255,255,255,0.12);

      --prompt-hover-bg: rgba(249,103,2,0.09);
      --prompt-hover-bd: rgba(249,103,2,0.28);
      --prompt-hover-c:  #E8EDF5;
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background:  var(--bg);
      color:       var(--t1);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s, color 0.2s;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── Smooth theme transitions (structural elements only) ────────── */
    header, aside, .surface-transition {
      transition: background-color 0.2s, border-color 0.2s;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* ── Cloudera logo image ────────────────────────────────────────── */
    .cld-logo {
      display: block;
      object-fit: contain;
      filter: var(--logo-filter);
      transition: filter 0.2s;
    }

    /* ── Markdown prose (theme-aware) ───────────────────────────────── */
    .prose { line-height: 1.75; font-size: 0.875rem; color: var(--t1); }
    .prose p { margin-bottom: 0.65em; }
    .prose p:last-child { margin-bottom: 0; }
    .prose strong { font-weight: 600; color: var(--t1); }
    .prose em { font-style: italic; color: var(--t2); }
    .prose ul, .prose ol { padding-left: 1.3em; margin-bottom: 0.65em; }
    .prose li { margin-bottom: 0.2em; color: var(--t1); }
    .prose h1,.prose h2,.prose h3 {
      font-family: var(--display); color: var(--t1);
      margin: 0.9em 0 0.4em;
    }
    .prose code {
      font-family: var(--mono); font-size: 0.8em;
      background: var(--code-bg); color: var(--code-color);
      padding: 1px 5px; border-radius: 4px;
    }
    .prose pre {
      background: var(--pre-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      overflow-x: auto; margin: 0.75em 0;
    }
    .prose pre code { background: none; color: var(--t2); padding: 0; }
    .prose table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 0.82rem; }
    .prose th {
      background: var(--s2); color: var(--t2); font-weight: 600;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .prose td { padding: 6px 12px; border-bottom: 1px solid var(--border); color: var(--t1); }
    .prose tr:last-child td { border-bottom: none; }
    .prose blockquote {
      border-left: 3px solid var(--orange); padding: 4px 14px;
      color: var(--t2); font-style: italic; margin: 0.7em 0;
    }
    .prose a { color: var(--o-text); text-decoration: underline; }
    .cite-icon { display:inline-flex; align-items:center; font-size:0.6rem; font-weight:700;
      padding:1px 5px; border-radius:8px; margin:0 2px; vertical-align:middle; line-height:1.5;
      letter-spacing:0.02em; }
    .cite-dok  { background:var(--t-dim); color:var(--teal); }
    .cite-dat  { background:var(--i-dim); color:var(--indigo); }

    /* ── Animations ─────────────────────────────────────────────────── */
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes dotpulse { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.65)} }
    @keyframes modePop  { 0%{opacity:0;transform:scale(0.8) translateY(4px)} 60%{transform:scale(1.06) translateY(0)} 100%{opacity:1;transform:scale(1)} }
    @keyframes glow     { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px var(--mode-glow,rgba(0,0,0,0.1))} }

    /* Mobile sidebar */
    .mobile-menu-btn { display: none; }
    @media (max-width: 640px) {
      :root { --sidebar-w: 240px; }
      .mobile-menu-btn { display: flex !important; }
      .sidebar-mobile-panel {
        position: fixed; left: 0; top: 0; bottom: 0;
        width: var(--sidebar-w); z-index: 50;
        transform: translateX(-100%); transition: transform 0.25s ease;
      }
      .sidebar-mobile-panel.open { transform: translateX(0); }
    }

    .slide-up { animation: slideUp 0.22s ease forwards; }
    .cursor   {
      display: inline-block; width: 2px; height: 0.9em;
      background: var(--orange); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    .spin {
      width: 15px; height: 15px;
      border: 2px solid var(--border); border-top-color: var(--orange);
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    .dot { animation: dotpulse 1.4s ease-in-out infinite; }

    /* ── App topbar — matches admin .topbar exactly ─────────────────── */
    .app-topbar {
      height: var(--topbar-h); flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 24px; gap: 12px;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--topbar-bd);
      z-index: 10;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    .app-topbar.glassy {
      background: rgba(248,249,250,0.82) !important;
      backdrop-filter: blur(14px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(14px) saturate(180%) !important;
    }
    [data-theme="dark"] .app-topbar.glassy {
      background: rgba(22,28,39,0.84) !important;
    }
    .app-topbar img.cld-logo { display: block; }

    /* ── GCP-style nav item (sidebar prompt buttons) ────────────────── */
    .nav-item {
      display: flex; align-items: center; gap: 6px;
      width: 100%; border: none; background: transparent;
      padding: 7px 10px 7px 14px;
      border-radius: 0 24px 24px 0;
      margin-right: 12px;
      color: var(--t2); font-size: 0.78rem; font-family: var(--font);
      text-align: left; cursor: pointer; line-height: 1.45;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover {
      background: var(--prompt-hover-bg);
      color: var(--prompt-hover-c);
    }
    .nav-item .nav-arrow {
      flex-shrink: 0; opacity: 0; font-size: 0.7rem; color: var(--orange);
      transition: opacity 0.12s, transform 0.12s;
      transform: translateX(-4px);
    }
    .nav-item:hover .nav-arrow {
      opacity: 1; transform: translateX(0);
    }

    /* ── Section label ──────────────────────────────────────────────── */
    .sec-label {
      font-size: 0.62rem; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 14px 16px 6px;
    }

    button { cursor: pointer; font-family: var(--font); }
    button:disabled { cursor: default; }
    textarea { font-family: var(--font); }

    /* ══ NEW VISUAL SYSTEM ═══════════════════════════════════════════ */

    /* ── Keyframes ──────────────────────────────────────────────────── */
    @keyframes shimmer    { from{background-position:-200% 0} to{background-position:200% 0} }
    @keyframes traceIn    { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    @keyframes pillFade   { 0%{opacity:0;transform:translateY(4px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes barRise    { from{transform:scaleY(0)} to{transform:scaleY(1)} }
    @keyframes panelSlide { from{transform:translateX(100%)} to{transform:translateX(0)} }

    /* ── Focus ring ─────────────────────────────────────────────────── */
    *:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; border-radius: 4px; }

    /* ── Button tactile press ───────────────────────────────────────── */
    button:not(:disabled):active { transform: scale(0.97); transition: transform 0.06s ease; }

    /* ── Skeleton shimmer ───────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
    }

    /* ── Message mode accent — left strip ───────────────────────────── */
    .msg-doc  { border-left-color: var(--teal)   !important; border-left-width: 3px !important; }
    .msg-data { border-left-color: var(--indigo) !important; border-left-width: 3px !important; }
    .msg-comb { border-left-color: var(--orange) !important; border-left-width: 3px !important; }

    /* ── Pipeline trace strip ───────────────────────────────────────── */
    .ptrace { display:flex; align-items:center; flex-wrap:wrap; gap:0; margin-bottom:12px; }
    .ptrace-step {
      display:flex; align-items:center; gap:5px;
      padding:3px 10px; border-radius:20px;
      border:1px solid var(--border); background:var(--s2);
      color:var(--t3); font-size:0.63rem; font-family:var(--mono); font-weight:500;
      white-space:nowrap; animation:traceIn 0.28s ease forwards;
      transition:border-color 0.35s, background 0.35s, color 0.35s;
    }
    .ptrace-step svg { width:10px; height:10px; flex-shrink:0; }
    .ptrace-step.ps-active {
      border-color:rgba(249,103,2,0.45); background:var(--o-dim); color:var(--orange);
    }
    .ptrace-step.ps-done {
      border-color:rgba(0,165,145,0.35); background:var(--t-dim); color:var(--teal);
    }
    .ptrace-arrow { color:var(--border); padding:0 3px; font-size:0.65rem; flex-shrink:0; }

    /* ── Citation slide panel (right side) ──────────────────────────── */
    .cit-panel {
      position:fixed; right:0; top:var(--topbar-h); bottom:0; width:360px; z-index:150;
      background:var(--surface); border-left:1px solid var(--border);
      box-shadow:-10px 0 40px rgba(0,0,0,0.12);
      display:flex; flex-direction:column; overflow:hidden;
      transform:translateX(100%);
      transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .cit-panel.cit-open { transform:translateX(0); }
    .cit-panel-header {
      padding:16px 16px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px; flex-shrink:0;
    }
    .cit-panel-body { flex:1; overflow-y:auto; padding:14px 16px; }

    /* glassmorphism handled by .app-topbar.glassy above */

    /* ── Persona selector ───────────────────────────────────────────── */
    .persona-btn {
      width:100%; display:flex; align-items:center; gap:9px;
      padding:8px 10px; border-radius:9px; border:1px solid var(--border);
      background:transparent; color:var(--t1); cursor:pointer;
      transition:all 0.15s; text-align:left;
    }
    .persona-btn:hover { background:var(--s2); border-color:var(--orange); }
    .persona-btn.active { background:var(--o-dim); border-color:var(--orange); }
    .persona-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .persona-name { font-size:0.78rem; font-weight:600; color:var(--t1); }
    .persona-role { font-size:0.63rem; color:var(--t3); margin-top:1px; }

    /* ── Story arc selector ─────────────────────────────────────────── */
    .arc-btn {
      width:100%; display:flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:8px; border:1px solid var(--border);
      background:transparent; color:var(--t2); cursor:pointer;
      font-size:0.74rem; font-weight:500; transition:all 0.15s; text-align:left;
    }
    .arc-btn:hover { background:var(--s2); color:var(--t1); border-color:var(--teal); }
    .arc-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Answer style selector ──────────────────────────────────────── */
    .style-tabs { display:flex; background:var(--s2); border-radius:8px; padding:3px; gap:2px; }
    .style-tab {
      flex:1; padding:4px 0; border-radius:6px; border:none;
      background:transparent; color:var(--t3); font-size:0.67rem; font-weight:600;
      cursor:pointer; transition:all 0.15s; font-family:var(--font);
    }
    .style-tab.active { background:var(--surface); color:var(--o-text); box-shadow:0 1px 4px rgba(0,0,0,0.1); }

    /* ── Follow-up suggestions ──────────────────────────────────────── */
    .followup-btn {
      width:100%; text-align:left; padding:7px 12px; border-radius:8px;
      border:1px solid var(--border); background:transparent;
      color:var(--t2); font-size:0.78rem; cursor:pointer; transition:all 0.15s;
      font-family:var(--font);
    }
    .followup-btn:hover { border-color:var(--orange); background:var(--o-dim); color:var(--t1); }

    /* ── Raw source view toggle ─────────────────────────────────────── */
    .view-toggle { display:flex; gap:4px; margin-bottom:10px; }
    .view-btn {
      padding:3px 11px; border-radius:6px; border:1px solid var(--border);
      background:transparent; color:var(--t3); font-size:0.68rem; font-weight:600;
      cursor:pointer; transition:all 0.15s; font-family:var(--font);
    }
    .view-btn.active { background:var(--orange); border-color:var(--orange); color:#fff; }

    /* ── Confidence bar ─────────────────────────────────────────────── */
    .conf-bar-wrap { flex-shrink:0; display:flex; align-items:center; gap:5px; }
    .conf-bar-track { width:40px; height:4px; border-radius:2px; background:var(--s3); overflow:hidden; }
    .conf-bar-fill  { height:100%; border-radius:2px; transition:width 0.4s ease; }
    .conf-pct { font-size:0.6rem; font-family:var(--mono); color:var(--t3); min-width:26px; text-align:right; }

    /* ── Chart type switcher ────────────────────────────────────────── */
    .chart-type-bar { display:flex; gap:4px; margin-bottom:6px; }
    .chart-type-btn {
      padding:2px 9px; border-radius:5px; border:1px solid var(--border);
      background:transparent; color:var(--t3); font-size:0.65rem; font-weight:600;
      cursor:pointer; transition:all 0.12s; font-family:var(--font);
    }
    .chart-type-btn.active { background:var(--indigo); border-color:var(--indigo); color:#fff; }

    /* ── Latency stage timing ───────────────────────────────────────── */
    .stage-time { font-size:0.58rem; font-family:var(--mono); color:var(--t3); margin-left:3px; }

    /* ── Agent mode ──────────────────────────────────────────────────── */
    .agent-toggle {
      padding:0 14px; height:32px; border-radius:8px;
      border:1px solid var(--border); background:var(--s2);
      color:var(--t2); font-size:0.78rem; font-weight:600;
      cursor:pointer; display:flex; align-items:center; gap:6px;
      transition:all 0.15s; flex-shrink:0; font-family:var(--font);
    }
    .agent-toggle.agent-on  { border-color:rgba(129,140,248,0.6); background:var(--i-dim); color:var(--indigo); }
    .agent-toggle.think-on  { border-color:rgba(52,211,153,0.6);  background:var(--t-dim); color:var(--teal); }
    .agent-toggle.debate-on { border-color:rgba(249,103,2,0.6);   background:var(--o-dim); color:var(--orange); }
    .agent-toggle svg { width:13px; height:13px; }
    /* ── Thinking / Reasoning panel ─────────────────────────────────────── */
    .think-panel { background:var(--s2); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; }
    .think-panel-header {
      display:flex; align-items:center; gap:8px; padding:8px 13px;
      cursor:pointer; font-size:0.72rem; font-weight:600; color:var(--teal);
    }
    .think-panel-header svg { width:13px; height:13px; flex-shrink:0; }
    .think-panel-words { font-size:0.62rem; font-weight:400; color:var(--t3); margin-left:4px; }
    .think-content {
      padding:10px 14px; font-size:0.71rem; color:var(--t3);
      font-family:var(--mono); white-space:pre-wrap; line-height:1.65;
      max-height:260px; overflow-y:auto; border-top:1px solid var(--border);
    }
    /* ── Debate panel ───────────────────────────────────────────────────── */
    .debate-panel { margin-bottom:10px; display:flex; flex-direction:column; gap:8px; }
    .debate-card {
      border-radius:10px; overflow:hidden;

    var t = (text || '')
      .replace(/\[dokumen\]/g, '<span class="cite-icon cite-dok">◈</span>')
      .replace(/\[data\]/g,    '<span class="cite-icon cite-dat">⬡</span>');
    return { __html: DOMPurify.sanitize(marked.parse(t)) };

  // Highlight query keywords in source chunk text (plain-text input → safe HTML output)
  function highlightHtml(text, query) {
    if (!text) return '';
    // HTML-escape raw text first to prevent injection before we add <mark> tags
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    if (!query) return safe;
    var words = query.trim().split(/\s+/).filter(function(w){ return w.length >= 3; });
    if (!words.length) return safe;
    var pats = words.map(function(w){ return w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); });
    return safe.replace(
      new RegExp('('+pats.join('|')+')','gi'),
      '<mark style="background:rgba(249,103,2,0.25);color:inherit;border-radius:2px;padding:0 1px">$1</mark>'
    );

      // Agent cases
      case 'AGENT_ASSISTANT':  return [...msgs, { id:a.id, role:'assistant', content:'', mode:'agent',  isStreaming:true, docCitations:[], sqlCitation:null, usage:null, error:null, question:a.question||'', suggestions:[], isAgent:true,  agentPhase:'planning', agentSteps:[] }];

      case 'AGENT_PLAN':      return msgs.map(m => m.id===a.id ? Object.assign({},m,{agentSteps:a.steps.map(function(s){return Object.assign({},s,{status:'pending'});}), agentPhase:'executing'}) : m);

  // ── SSE over POST ──────────────────────────────────────────────────
  async function* ssePost(url, body) {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const blocks = buf.split('\n\n');
      buf = blocks.pop();
      for (const block of blocks) {
        if (!block.trim()) continue;
        let event = 'message', data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: '))  event = line.slice(7).trim();
          else if (line.startsWith('data: ')) data  = line.slice(6);
        }
        if (data !== null) yield { event, data: JSON.parse(data) };
      }
    }
  }

            fontSize:'1rem', flexShrink:0, color:'var(--t2)',
          }}
          title="Toggle sidebar"
        >☰</button>

        <!-- Logo — identical structure to admin pages: plain <a><img/></a> -->
        <a href="/"><${CldLogo} height=${20}/></a>
        <div style=${{ width:'1px', height:'20px', background:'var(--border)', flexShrink:0 }}/>
        <span style=${{
          fontFamily:'var(--display)',
          fontSize:'0.95rem', fontWeight:700,
          color:'var(--t1)', letterSpacing:'-0.01em',
          whiteSpace:'nowrap', flexShrink:0,
        }}>Enterprise <span style=${{ color:'var(--orange)' }}>Assistant</span></span>

        <!-- Right controls -->
        <div style=${{ marginLeft:'auto', display:'flex', alignItems:'center', gap:'6px' }}>
          ${props.autoPlayTotal > 0 && (props.isAutoPlaying
            ? html`
              <div style=${{ display:'flex', alignItems:'center', gap:'5px', flexShrink:0 }}>
                <span style=${{
                  display:'inline-block', width:'7px', height:'7px', borderRadius:'50%', flexShrink:0,
                  background: props.isAutoPaused ? 'var(--t3)' : 'var(--orange)',
                  animation: props.isAutoPaused ? 'none' : 'dotpulse 1s ease-in-out infinite',
                }}/>
                <button
                  onClick=${props.isAutoPaused ? props.onResumeAutoPlay : props.onPauseAutoPlay}
                  title=${props.isAutoPaused ? 'Resume demo (Ctrl+Shift+D)' : 'Pause demo (Ctrl+Shift+D)'}
                  style=${{
                    height:'32px', padding:'0 12px', borderRadius:'8px',
                    border:'1px solid var(--orange)', background:'var(--o-dim)',
                    color:'var(--o-text)', fontSize:'0.78rem', fontWeight:600,
                    cursor:'pointer', transition:'all 0.15s', flexShrink:0, whiteSpace:'nowrap',
                  }}
                >${props.isAutoPaused ? '▶ Resume' : '⏸'} ${props.autoPlayIdx+1}/${props.autoPlayTotal}</button>
                <button
                  onClick=${props.onRestartAutoPlay}
                  title="Restart demo from question 1 (clears history)"
                  style=${{
                    height:'32px', padding:'0 10px', borderRadius:'8px',
                    border:'1px solid var(--border)', background:'var(--s2)',
                    color:'var(--t3)', fontSize:'0.78rem',
                    cursor:'pointer', transition:'all 0.15s', flexShrink:0,
                    display:'flex', alignItems:'center', gap:'4px',
                  }}
                  onMouseEnter=${function(e){ e.currentTarget.style.background='var(--o-dim)'; e.currentTarget.style.color='var(--o-text)'; e.currentTarget.style.borderColor='var(--orange)'; }}
                  onMouseLeave=${function(e){ e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t3)'; e.currentTarget.style.borderColor='var(--border)'; }}
                >⟳ Q1</button>
                <button
                  onClick=${props.onStopAutoPlay}
                  title="Stop demo"
                  style=${{
                    height:'32px', padding:'0 8px', borderRadius:'8px',
                    border:'1px solid var(--border)', background:'var(--s2)',
                    color:'var(--t3)', fontSize:'0.78rem',
                    cursor:'pointer', transition:'all 0.15s', flexShrink:0,
                  }}
                  onMouseEnter=${function(e){ e.currentTarget.style.background='var(--s3)'; e.currentTarget.style.color='var(--t1)'; }}
                  onMouseLeave=${function(e){ e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t3)'; }}
                >⏹</button>
              </div>`
            : html`
              <button
                onClick=${props.onStartAutoPlay}
                title="Run demo sequence (Ctrl+Shift+D)"
                style=${{
                  height:'32px', padding:'0 14px', borderRadius:'8px',
                  border:'1px solid var(--border)', background:'var(--s2)',
                  color:'var(--t2)', fontSize:'0.78rem', fontWeight:500,
                  cursor:'pointer', transition:'all 0.15s', flexShrink:0, whiteSpace:'nowrap',
                  display:'flex', alignItems:'center', gap:'5px',
                }}
                onMouseEnter=${function(e){ e.currentTarget.style.borderColor='var(--orange)'; e.currentTarget.style.color='var(--orange)'; }}
                onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)'; }}
              >▶ Demo</button>`
          )}
          ${[
            { href:'/explorer', label:'Data Explorer' },
            { href:'/upload',   label:'Upload' },
            { href:'/metrics',       label:'Metrics' },
            { href:'/presentation',  label:'Slides' },
            { href:'/setup',         label:'Status' },
            { href:'/configure',label:'Settings' },
          ].map(function(link) {
            return html`<a
              key=${link.href}
              href=${link.href}
              style=${{
                height:'32px', padding:'0 14px', borderRadius:'8px',
                border:'1px solid var(--border)', background:'var(--s2)',
                color:'var(--t2)', fontSize:'0.8rem', fontWeight:500,
                display:'flex', alignItems:'center',
                textDecoration:'none', transition:'all 0.15s', flexShrink:0,
                whiteSpace:'nowrap',
              }}
              onMouseEnter=${function(e){ e.currentTarget.style.background='var(--s3)'; e.currentTarget.style.color='var(--t1)'; }}
              onMouseLeave=${function(e){ e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t2)'; }}
            >${link.label}</a>`;
          })}
          <!-- New conversation -->
          <button
            onClick=${props.onReset}
            title="New conversation"
            style=${{
              width:'34px', height:'34px', borderRadius:'8px',
              border:'1px solid var(--border)', background:'var(--s2)',
              color:'var(--t2)', display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.15s', flexShrink:0,
            }}
            onMouseEnter=${function(e){ e.currentTarget.style.background='var(--s3)'; e.currentTarget.style.color='var(--err)'; e.currentTarget.style.borderColor='var(--err)'; }}
            onMouseLeave=${function(e){ e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t2)'; e.currentTarget.style.borderColor='var(--border)'; }}
          ><${IcoTrash}/></button>
          ${props.onExport && html`
            <button
              onClick=${props.onExport}
              title="Export conversation as Markdown"
              style=${{
                width:'34px', height:'34px', borderRadius:'8px',
                border:'1px solid var(--border)', background:'var(--s2)',
                color:'var(--t2)', display:'flex', alignItems:'center', justifyContent:'center',
                transition:'all 0.15s', flexShrink:0,
              }}
              onMouseEnter=${function(e){ e.currentTarget.style.background='var(--s3)'; e.currentTarget.style.color='var(--teal)'; e.currentTarget.style.borderColor='var(--teal)'; }}
              onMouseLeave=${function(e){ e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t2)'; e.currentTarget.style.borderColor='var(--border)'; }}
            >
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 12v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1"/></svg>
            </button>
          `}
          <${ThemeToggle} theme=${props.theme} onToggle=${props.onToggle}/>
        </div>
      </div>`;
  }

  // ── Status row ─────────────────────────────────────────────────────
  function StatusRow(props) {
    return html`
      <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'5px 16px' }}>
        <div style=${{ display:'flex', alignItems:'center', gap:'8px' }}>
          <div style=${{
            width:'7px', height:'7px', borderRadius:'50%', flexShrink:0,
            background: props.ok ? 'var(--ok)'  : 'var(--err)',
            boxShadow:  props.ok ? '0 0 6px var(--ok-glow)' : '0 0 6px var(--err-glow)',
          }}/>
          <span style=${{ fontSize:'0.77rem', color:'var(--t1)' }}>${props.label}</span>
        </div>
        ${props.detail && html`
          <span style=${{ fontSize:'0.7rem', color:'var(--t3)', fontFamily:'var(--mono)', maxWidth:'96px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            ${props.detail}
          </span>`}
      </div>`;
  }

  // ── Sidebar ────────────────────────────────────────────────────────
  function Sidebar(props) {
    const caps = [
      { icon:'◈', color:'var(--teal)',   label:'Document RAG',    sub:'PDF · DOCX · TXT' },
      { icon:'⬡', color:'var(--indigo)', label:'Structured Data', sub:'SQL generation' },
      { icon:'⬡', color:'var(--orange)', label:'Combined',        sub:'Docs + data fusion' },
    ];
    var domainMeta = {
      banking:    { icon:'◈', label:'Banking' },
      telco:      { icon:'⬡', label:'Telco' },
      government: { icon:'⬢', label:'Gov' },
      all:        { icon:'◉', label:'All' },
    };

    return html`
      <aside style=${{
        width:'var(--sidebar-w)', minWidth:'var(--sidebar-w)',
        height:'100%', overflowY:'auto',
        background:'var(--sidebar-bg)',
        borderRight:'2px solid var(--sidebar-bd)',
        display:'flex', flexDirection:'column',
      }}>

        <!-- Persona selector (above domain) -->
        <div style=${{ borderBottom:'1px solid var(--border)' }}>
          <${PersonaSelector} persona=${props.persona} onSelect=${props.onPersonaSelect}/>
        </div>

        <!-- Domain + Language selector -->
        <div style=${{ padding:'10px 12px 8px', borderBottom:'1px solid var(--border)' }}>
          <div style=${{ fontSize:'0.62rem', fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--t3)', marginBottom:'6px' }}>Domain</div>
          <!-- Domain tabs with bottom indicator -->
          <div style=${{ position:'relative', display:'flex', gap:'3px', borderBottom:'2px solid var(--border)', paddingBottom:'2px' }}>
            ${(props.domains||[{id:'banking',label:'Banking'},{id:'telco',label:'Telco'},{id:'government',label:'Government'}]).map(function(d){
              var active = props.domain === d.id;
              var meta = domainMeta[d.id] || {};
              return html`
                <button key=${d.id}
                  onClick=${function(){ if(props.onDomainChange) props.onDomainChange(d.id); }}
                  title=${d.label}
                  style=${{
                    flex:1, padding:'6px 0 5px', borderRadius:'6px 6px 0 0',
                    border:'none',
                    background: active ? 'var(--o-dim)' : 'transparent',
                    color: active ? 'var(--o-text)' : 'var(--t3)',
                    fontSize:'0.67rem', fontWeight: active ? 700 : 400,
                    cursor:'pointer', transition:'all 0.18s',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:'2px',
                    position:'relative',
                  }}
                  onMouseEnter=${function(e){ if(props.domain!==d.id){ e.currentTarget.style.color='var(--t2)'; e.currentTarget.style.background='var(--s2)'; } }}
                  onMouseLeave=${function(e){ if(props.domain!==d.id){ e.currentTarget.style.color='var(--t3)'; e.currentTarget.style.background='transparent'; } }}
                >
                  <span style=${{ fontSize:'0.85rem', lineHeight:1, fontWeight:500 }}>${meta.icon || ''}</span>
                  <span>${meta.label || d.label}</span>
                  ${active && html`<span style=${{ position:'absolute', bottom:'-4px', left:'10%', right:'10%', height:'2px', background:'var(--orange)', borderRadius:'2px', transition:'all 0.2s' }}/>`}
                </button>`;
            })}
          </div>
          <!-- Language toggle -->
          <div style=${{ display:'flex', gap:'4px', marginTop:'8px', background:'var(--s2)', borderRadius:'8px', padding:'3px' }}>
            ${['id','en'].map(function(l){
              var active = props.language === l;
              return html`
                <button key=${l}
                  onClick=${function(){ if(props.onLanguageChange) props.onLanguageChange(l); }}
                  style=${{
                    flex:1, padding:'5px 0', borderRadius:'6px',
                    border:'none',
                    background: active ? 'var(--surface)' : 'transparent',
                    color: active ? 'var(--o-text)' : 'var(--t3)',
                    fontSize:'0.7rem', fontWeight: active ? 600 : 400,
                    cursor:'pointer', transition:'all 0.15s',
                    boxShadow: active ? '0 1px 4px rgba(0,0,0,0.1)' : 'none',
                  }}
                >${l === 'id' ? 'Bahasa ID' : 'English'}</button>`;
            })}
          </div>
        </div>

        <!-- System status (collapsed when all OK) -->
        <div className="sec-label">System</div>
        <div style=${{ background:'var(--s2)', marginBottom:'4px', borderTop:'1px solid var(--border)', borderBottom:'1px solid var(--border)' }}>
          ${!props.status
            ? html`<div style=${{ padding:'8px 16px', fontSize:'0.75rem', color:'var(--t3)' }}>Checking…</div>`
            : (function() {
                var vsOk  = !!(props.status.vector_store && props.status.vector_store.ok);
                var dbOk  = !!(props.status.database     && props.status.database.ok);
                var llmOk = !!(props.status.llm          && props.status.llm.ok);
                var allOk = vsOk && dbOk && llmOk;
                if (allOk) {
                  return html`
                    <div style=${{ display:'flex', alignItems:'center', gap:'8px', padding:'7px 16px' }}>
                      <div style=${{ width:'7px', height:'7px', borderRadius:'50%', flexShrink:0, background:'var(--ok)', boxShadow:'0 0 6px var(--ok-glow)' }}/>
                      <span style=${{ fontSize:'0.77rem', color:'var(--t2)' }}>All systems operational</span>
                    </div>`;
                }
                return html`
                  ${!vsOk  && html`<${StatusRow} label="Vector Store" ok=${false} detail="Not indexed"/>`}
                  ${!dbOk  && html`<${StatusRow} label="Database"     ok=${false} detail="Disconnected"/>`}
                  ${!llmOk && html`<${StatusRow} label="LLM"          ok=${false} detail=${(props.status.llm && props.status.llm.model) || 'Not configured'}/>`}
                `;
              })()
          }
        </div>

        <!-- Capabilities -->
        <div className="sec-label">Capabilities</div>
        ${caps.map(function(c) {
          return html`
            <div key=${c.label} style=${{
              display:'flex', alignItems:'center', gap:'10px',
              padding:'7px 16px', cursor:'default',
            }}>
              <span style=${{ color:c.color, fontSize:'0.95rem', lineHeight:1, flexShrink:0 }}>${c.icon}</span>
              <div>
                <div style=${{ fontSize:'0.78rem', fontWeight:500, color:'var(--t1)' }}>${c.label}</div>
                <div style=${{ fontSize:'0.68rem', color:'var(--t3)', marginTop:'1px' }}>${c.sub}</div>
              </div>
            </div>`;
        })}

        <!-- Sample prompts (grouped by mode) -->
        <div className="sec-label" style=${{ marginTop:'8px' }}>Try asking</div>
        <div style=${{ paddingRight:'12px' }}>
          ${(function() {
            // Group samples by mode, preserving order of first appearance
            var groups = [];
            var seen = {};
            (props.samples || []).forEach(function(s) {
              var text = typeof s === 'string' ? s : s.text;
              var mode = (typeof s === 'object' && s.mode) ? s.mode : null;
              if (mode && !seen[mode]) { seen[mode] = true; groups.push({ mode, items: [] }); }
              if (!mode && !seen['__none__']) { seen['__none__'] = true; groups.push({ mode: null, items: [] }); }
              var key = mode || '__none__';
              groups.find(function(g){ return (g.mode||'__none__') === key; }).items.push(text);
            });

            return groups.map(function(g) {
              var m = g.mode ? MODES[g.mode] : null;
              return html`
                <div key=${g.mode || 'none'}>
                  ${m && html`
                    <div style=${{ display:'flex', alignItems:'center', gap:'6px', padding:'6px 4px 2px 4px', margin:'4px 0 0 0' }}>
                      <span style=${{ color:m.color, fontSize:'0.8rem' }}>${m.icon}</span>
                      <span style=${{ fontSize:'0.68rem', fontWeight:600, letterSpacing:'0.04em', textTransform:'uppercase', color:m.color }}>${m.label}</span>
                    </div>`
                  }
                  ${g.items.map(function(text, i) {
                    const label = text.length > 68 ? text.slice(0, 68) + '…' : text;
                    return html`
                      <button
                        key=${i}
                        className="nav-item"
                        onClick=${function() { props.onPick(text); }}
                      >
                        <span style=${{ flex:1 }}>${label}</span>
                        <span className="nav-arrow">→</span>
                      </button>`;
                  })}
                </div>`;
            });
          })()}
        </div>

        <!-- Story Arcs -->
        <div style=${{ borderTop:'1px solid var(--border)' }}>
          <${StoryArcSelector} onStart=${props.onStoryArc}/>
        </div>

        <!-- Answer Style -->
        <${AnswerStyleSelector} style=${props.answerStyle} onChange=${props.onStyleChange}/>

        <!-- Spacer -->
        <div style=${{ flex:1 }}/>

        <!-- Demo auto-play control -->
        <div style=${{ padding:'10px 14px 12px', borderTop:'1px solid var(--border)' }}>
          <div className="sec-label" style=${{ padding:'0 0 7px', fontSize:'0.6rem' }}>Demo</div>
          ${props.isAutoPlaying
            ? html`
              <div>
                <div style=${{ fontSize:'0.7rem', color:'var(--t2)', marginBottom:'7px', display:'flex', alignItems:'center', gap:'6px' }}>
                  <span style=${{ display:'inline-block', width:'7px', height:'7px', borderRadius:'50%',
                    background: props.isAutoPaused ? 'var(--t3)' : 'var(--orange)', flexShrink:0,
                    animation: props.isAutoPaused ? 'none' : 'dotpulse 1s ease-in-out infinite' }}/>
                  ${props.isAutoPaused ? 'Paused — ' : ''}Q ${props.autoPlayIdx + 1} / ${props.autoPlayTotal}
                </div>
                <div style=${{ display:'flex', gap:'5px' }}>
                  <button
                    onClick=${props.isAutoPaused ? props.onResumeAutoPlay : props.onPauseAutoPlay}
                    style=${{
                      flex:1, padding:'6px 6px', borderRadius:'7px',
                      border:'1px solid var(--border)', background:'var(--s2)',
                      color:'var(--t2)', fontSize:'0.72rem', fontWeight:500,
                      cursor:'pointer', transition:'all 0.15s',
                    }}
                    onMouseEnter=${function(e){ e.currentTarget.style.borderColor='var(--orange)'; e.currentTarget.style.color='var(--orange)'; }}
                    onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)'; }}
                  >${props.isAutoPaused ? '▶ Resume' : '⏸ Pause'}</button>
                  <button
                    onClick=${props.onStopAutoPlay}
                    style=${{
                      flex:1, padding:'6px 6px', borderRadius:'7px',
                      border:'1px solid var(--err)', background:'transparent',
                      color:'var(--err)', fontSize:'0.72rem', fontWeight:500,
                      cursor:'pointer', transition:'all 0.15s',
                    }}
                    onMouseEnter=${function(e){ e.currentTarget.style.background='rgba(234,67,53,0.08)'; }}
                    onMouseLeave=${function(e){ e.currentTarget.style.background='transparent'; }}
                  >⏹ Stop</button>
                </div>
              </div>`
            : html`
              <button
                onClick=${props.onStartAutoPlay}
                disabled=${!props.autoPlayTotal}
                style=${{
                  width:'100%', padding:'6px 10px', borderRadius:'7px',
                  border:'1px solid var(--border)', background:'var(--s2)',
                  color:'var(--t2)', fontSize:'0.74rem', fontWeight:500,
                  cursor: props.autoPlayTotal ? 'pointer' : 'default',
                  transition:'all 0.15s', opacity: props.autoPlayTotal ? 1 : 0.5,
                }}
                onMouseEnter=${function(e){ if(props.autoPlayTotal){ e.currentTarget.style.borderColor='var(--orange)'; e.currentTarget.style.color='var(--orange)'; }}}
                onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)'; }}
              >▶ Run Demo</button>`
          }
        </div>

        <!-- Footer -->
        <div style=${{ padding:'10px 14px 12px', borderTop:'1px solid var(--border)' }}>
          ${props.onFullReset && html`
            <button
              onClick=${props.onFullReset}
              title="Restart demo from Q1 — resets domain, language, and chat history (Ctrl+Shift+R)"
              style=${{
                width:'100%', padding:'5px 10px', borderRadius:'7px',
                border:'1px solid var(--border)', background:'transparent',
                color:'var(--t3)', fontSize:'0.68rem', fontWeight:500,
                cursor:'pointer', transition:'all 0.15s', marginBottom:'8px',
              }}
              onMouseEnter=${function(e){ e.currentTarget.style.borderColor='var(--orange)'; e.currentTarget.style.color='var(--orange)'; }}
              onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t3)'; }}
            >↺ Reset Demo</button>
          `}
          <div style=${{ fontSize:'0.65rem', color:'var(--t3)', textAlign:'center' }}>
            Powered by <span style=${{ color:'var(--orange)', fontWeight:600 }}>Cloudera AI Inference</span>
          </div>
        </div>
      </aside>`;
  }

  // ── Persona Selector ──────────────────────────────────────────────
  function PersonaSelector({ persona, onSelect }) {
    return html`
      <div>
        <div className="sec-label" style=${{ paddingBottom:'6px' }}>Persona</div>
        <div style=${{ padding:'0 8px 10px', display:'flex', flexDirection:'column', gap:'5px' }}>
          ${PERSONAS.map(function(p) {
            var active = persona && persona.id === p.id;
            return html`
              <button key=${p.id} className=${'persona-btn' + (active ? ' active' : '')}
                onClick=${function() { onSelect(active ? null : p); }}>
                <div className="persona-dot" style=${{ background: p.color }}/>
                <div>
                  <div className="persona-name">${p.name}</div>
                  <div className="persona-role">${p.role}</div>
                </div>
                ${active && html`<span style=${{ marginLeft:'auto', fontSize:'0.6rem', color:'var(--orange)' }}>×</span>`}
              </button>`;
          })}
        </div>
      </div>`;
  }

  // ── Story Arc Selector ────────────────────────────────────────────
  function StoryArcSelector({ onStart }) {
    return html`
      <div>
        <div className="sec-label" style=${{ paddingBottom:'6px' }}>Story Arcs</div>
        <div style=${{ padding:'0 8px 10px', display:'flex', flexDirection:'column', gap:'5px' }}>
          ${STORY_ARCS.map(function(arc) {
            return html`
              <button key=${arc.id} className="arc-btn"
                onClick=${function() { onStart(arc); }}
                title=${'Runs ' + arc.questions.length + ' questions — ' + (arc.lang === 'id' ? 'Bahasa ID' : 'English')}>
                <div className="arc-dot" style=${{ background: arc.color }}/>
                <span style=${{ flex:1 }}>${arc.label}</span>
                <span style=${{ fontSize:'0.6rem', color:'var(--t3)', fontFamily:'var(--mono)' }}>${arc.questions.length}Q</span>
              </button>`;
          })}
        </div>
      </div>`;
  }

  // ── Answer Style Selector ─────────────────────────────────────────
  function AnswerStyleSelector({ style, onChange }) {
    return html`
      <div style=${{ padding:'0 8px 10px', borderTop:'1px solid var(--border)', paddingTop:'10px' }}>
        <div style=${{ fontSize:'0.62rem', fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--t3)', marginBottom:'6px' }}>Answer Style</div>
        <div className="style-tabs">
          ${STYLES.map(function(s) {
            return html`
              <button key=${s.id} className=${'style-tab' + (style === s.id ? ' active' : '')}
                onClick=${function() { onChange(s.id); }}
                title=${s.desc}>${s.label}</button>`;
          })}
        </div>
      </div>`;
  }

  // ── Follow-up Suggestions ─────────────────────────────────────────
  function FollowupSuggestions({ suggestions, onPick }) {
    if (!suggestions || !suggestions.length) return null;
    return html`
      <div style=${{ marginTop:'12px', paddingTop:'12px', borderTop:'1px solid var(--border)' }}>
        <div style=${{ fontSize:'0.62rem', color:'var(--t3)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:'7px' }}>
          You might also ask
        </div>
        <div style=${{ display:'flex', flexDirection:'column', gap:'5px' }}>
          ${suggestions.map(function(s, i) {
            return html`
              <button key=${i} className="followup-btn"
                onClick=${function() { if(onPick) onPick(s); }}>
                <span style=${{ color:'var(--t3)', marginRight:'6px' }}>→</span>${s}
              </button>`;
          })}
        </div>
      </div>`;
  }

  // ── Export chat button ────────────────────────────────────────────
  function exportChat(msgs, domain, language) {
    var lines = [
      '# Cloudera AI Enterprise Assistant — Chat Export',
      '**Domain:** ' + domain + ' | **Language:** ' + (language === 'id' ? 'Bahasa Indonesia' : 'English'),
      '**Exported:** ' + new Date().toLocaleString(),
      '',
    ];
    msgs.forEach(function(m) {
      if (m.role === 'user') {
        lines.push('---', '', '**You:** ' + m.content, '');
      } else if (m.role === 'assistant' && m.content) {
        lines.push('**Assistant:** ' + m.content, '');
        if (m.docCitations && m.docCitations.length) {
          lines.push('**Sources:**');
          m.docCitations.forEach(function(c, i) {
            lines.push((i+1) + '. ' + c.title + ' (chunk ' + (c.chunk_index+1) + ')');
            if (c.excerpt) lines.push('   > ' + c.excerpt.slice(0,200));
          });
          lines.push('');
        }
        if (m.sqlCitation && m.sqlCitation.sql) {
          lines.push('**SQL:** `' + m.sqlCitation.sql + '`', '');
        }
      }
    });
    var blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = 'cloudera-chat-' + new Date().toISOString().slice(0,10) + '.md';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Pipeline trace — real-time processing steps ────────────────────
  // Derives stage completion purely from existing message state fields.
  function PipelineTrace({ msg }) {
    if (!msg || !msg.isStreaming && !msg.mode) return null;
    var m = msg.mode ? getMode(msg.mode) : null;
    var routerDone   = !!msg.mode;
    var retrieveDone = routerDone && msg.content && msg.content.length > 0;
    var synthDone    = retrieveDone && !msg.isStreaming;

    var retrieveLabel =
      msg.mode === 'document' ? '◈ RAG Retrieval' :
      msg.mode === 'data'     ? '⬡ SQL Engine'    :
      msg.mode === 'combined' ? '⚡ Parallel'      : '…';

    // Per-stage timing (stored on message when stages complete)
    var routerMs   = msg._routerMs   ? html`<span className="stage-time">${msg._routerMs}ms</span>`   : null;
    var retrieveMs = msg._retrieveMs ? html`<span className="stage-time">${msg._retrieveMs}ms</span>` : null;
    var synthMs    = msg.latency_ms && msg._retrieveMs && msg._routerMs
      ? html`<span className="stage-time">${msg.latency_ms - msg._retrieveMs - msg._routerMs}ms</span>` : null;

    function stepClass(done, active) {
      if (done) return 'ptrace-step ps-done';
      if (active) return 'ptrace-step ps-active';
      return 'ptrace-step';
    }

    return html`
      <div className="ptrace">
        <div className=${stepClass(routerDone, !routerDone)} style=${{ animationDelay:'0ms' }}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          ${routerDone ? 'Router: ' + (m ? m.label : '') : 'Routing…'}
          ${routerMs}
        </div>
        ${routerDone && html`
          <span className="ptrace-arrow">→</span>
          <div className=${stepClass(retrieveDone, !retrieveDone)} style=${{ animationDelay:'60ms' }}>
            ${retrieveLabel}${retrieveMs}
          </div>
          <span className="ptrace-arrow">→</span>
          <div className=${stepClass(synthDone, retrieveDone && !synthDone)} style=${{ animationDelay:'120ms' }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            ${synthDone ? 'Done' : 'Synthesizing…'}${synthDone ? synthMs : null}
          </div>
        `}
      </div>`;
  }

  // ── Map chart — Leaflet bubble map for geo-tagged SQL results ─────────
  function MapChart({ sc, valueLabel }) {
    var mapDivRef  = useRef(null);
    var instanceRef = useRef(null);

    useEffect(function() {
      if (!mapDivRef.current || !sc || !sc.table_markdown || typeof window.L === 'undefined') return;

      // Parse markdown table
      var lines = sc.table_markdown.trim().split('\n').filter(function(l){ return l.trim().startsWith('|'); });
      if (lines.length < 3) return;
      function parseCells(line) { return line.split('|').slice(1,-1).map(function(c){ return c.trim(); }); }
      var headers = parseCells(lines[0]);
      var rows    = lines.slice(2).map(parseCells);
      if (!rows.length) return;

      // Find geo column (city / region / province)
      var geoIdx = -1;
      for (var i = 0; i < headers.length; i++) {
        if (/^(city|region|province|kota|provinsi|wilayah)$/i.test(headers[i])) { geoIdx = i; break; }
      }
      if (geoIdx === -1) return;

      // Find primary numeric value column (skip geo, lat, lon)
      var valIdx = -1;
      var skipCols = new Set(['lat','lon','id']);
      for (var ci = 0; ci < headers.length; ci++) {
        if (ci === geoIdx || skipCols.has(headers[ci].toLowerCase())) continue;
        if (rows.some(function(r){ return r[ci] && !isNaN(parseFloat((r[ci]||'').replace(/,/g,''))); })) {
          valIdx = ci; break;
        }
      }
      if (valIdx === -1) return;

      var latIdx = headers.map(function(h){ return h.toLowerCase(); }).indexOf('lat');
      var lonIdx = headers.map(function(h){ return h.toLowerCase(); }).indexOf('lon');

      // Teardown previous instance
      if (instanceRef.current) { try { instanceRef.current.remove(); } catch(e){} instanceRef.current = null; }

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

      var map = window.L.map(mapDivRef.current, {
        center: [-2.0, 118.0], zoom: 4,
        zoomControl: true, scrollWheelZoom: false,
      });
      window.L.tileLayer(
        isDark
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
          : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        { attribution: '© <a href="https://osm.org/copyright" target="_blank">OSM</a> © <a href="https://carto.com/attributions" target="_blank">CARTO</a>', subdomains:'abcd', maxZoom:19 }
      ).addTo(map);

      var values = rows.map(function(r){ return parseFloat((r[valIdx]||'0').replace(/,/g,''))||0; });
      var maxVal = Math.max.apply(null, values) || 1;
      var minVal = Math.min.apply(null, values);
      var range  = maxVal - minVal || 1;
      var markerLatLngs = [];

      rows.forEach(function(row, i) {
        var cityName = row[geoIdx];
        var coords;
        if (latIdx >= 0 && lonIdx >= 0 && row[latIdx] && row[lonIdx]) {
          var lt = parseFloat(row[latIdx]), ln = parseFloat(row[lonIdx]);
          if (!isNaN(lt) && !isNaN(ln)) coords = [lt, ln];
        }
        if (!coords) coords = _CITY_COORDS[cityName];
        if (!coords) return;

        var val  = values[i];
        var norm = (val - minVal) / range;

        // Gradient: teal -> orange -> red
        var r, g, b;
        if (norm < 0.5) {
          var t = norm * 2;
          r = Math.round(0   + t * 249); g = Math.round(165 + t * (103-165)); b = Math.round(145 + t * (2-145));
        } else {
          var t2 = (norm - 0.5) * 2;
          r = Math.round(249 + t2 * (239-249)); g = Math.round(103 + t2 * (68-103)); b = Math.round(2 + t2 * (68-2));
        }
        var color  = 'rgb('+r+','+g+','+b+')';
        var radius = Math.max(9, Math.min(38, 10 + norm * 28));

        var marker = window.L.circleMarker(coords, {
          radius: radius, fillColor: color,
          color: isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.18)',
          weight: 1.5, opacity: 1, fillOpacity: 0.78,
        });

        var fmtVal = val >= 1e9 ? (val/1e9).toFixed(2)+'B'
                   : val >= 1e6 ? (val/1e6).toFixed(2)+'M'
                   : val >= 1e3 ? (val/1e3).toFixed(1)+'K'
                   : val.toLocaleString(undefined, {maximumFractionDigits:2});

        // Build extra row labels for secondary columns
        var extras = '';
        for (var ci2 = 0; ci2 < headers.length; ci2++) {
          if (ci2 === geoIdx || ci2 === valIdx || skipCols.has(headers[ci2].toLowerCase())) continue;
          var v2 = row[ci2]; if (!v2 || v2 === '') continue;
          var v2num = parseFloat((v2||'').replace(/,/g,''));
          var v2fmt = isNaN(v2num) ? v2
            : v2num >= 1e9 ? (v2num/1e9).toFixed(2)+'B'
            : v2num >= 1e6 ? (v2num/1e6).toFixed(2)+'M'
            : v2num >= 1e3 ? (v2num/1e3).toFixed(1)+'K'
            : v2num.toLocaleString(undefined,{maximumFractionDigits:2});
          extras += '<br><span style="color:#888">'+headers[ci2]+':</span> '+v2fmt;
        }

        marker.bindTooltip(
          '<div style="font-family:system-ui;font-size:12px;line-height:1.6;min-width:120px">'
          + '<strong style="display:block;font-size:13px;margin-bottom:1px">'+cityName+'</strong>'
          + '<span style="color:#888">'+headers[valIdx]+':</span> <strong style="color:'+color+'">'+fmtVal+'</strong>'
          + extras + '</div>',
          { permanent: false, direction: 'top', offset: [0, -(radius+4)] }
        );
        marker.addTo(map);
        markerLatLngs.push(coords);
      });

      if (markerLatLngs.length > 1) {
        try { map.fitBounds(window.L.latLngBounds(markerLatLngs), { padding:[32,32], maxZoom:7 }); } catch(e) {}
      }

      instanceRef.current = map;
      return function() { try { if (instanceRef.current) { instanceRef.current.remove(); instanceRef.current = null; } } catch(e){} };
    }, [sc]);

    return html`
      <div style=${{ position:'relative', marginBottom:'4px' }} className="map-chart-wrap">
        <div ref=${mapDivRef} style=${{ width:'100%', height:'370px' }}/>
        <div className="map-legend">
          <div style=${{ fontWeight:600, marginBottom:'3px', fontSize:'0.65rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>${valueLabel || 'Value'}</div>
          <div className="map-legend-bar"/>
          <div className="map-legend-labels"><span>Low</span><span>High</span></div>
        </div>
      </div>`;
  }

  function DataChart(props) {
    var wrapRef   = useRef(null);
    var canvasRef = useRef(null);
    var tipRef    = useRef(null);
    var rafRef    = useRef(null);
    var sc = props.sc;

    // Detect if result has a geo column (city/region) usable for map view
    var hasGeo = (function() {
      if (!sc || !sc.table_markdown || typeof window.L === 'undefined') return false;
      var firstLine = (sc.table_markdown.trim().split('\n')[0] || '');
      return /\|\s*(city|region|province|kota|provinsi|wilayah)\s*\|/i.test(firstLine);
    })();

    var [chartType, setChartType] = useState(function(){ return hasGeo ? 'map' : 'bar'; });

    // Switch to map automatically when new geo data arrives, back to bar otherwise
    useEffect(function() {
      setChartType(hasGeo ? 'map' : 'bar');
    }, [sc && sc.sql]);

    useEffect(function() {
      if (!sc || !sc.table_markdown || !canvasRef.current) return;
      var lines = sc.table_markdown.trim().split('\n').filter(function(l) { return l.trim().startsWith('|'); });
      if (lines.length < 3) return;

      function parseCells(line) {
        return line.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      }
      var headers = parseCells(lines[0]);
      var rows    = lines.slice(2).map(parseCells);
      if (!rows.length || headers.length < 2) return;

      var valCol = -1;
      for (var ci = 1; ci < headers.length; ci++) {
        if (rows.some(function(r) { return r[ci] && !isNaN(parseFloat((r[ci] || '').replace(/,/g,''))); })) {
          valCol = ci; break;
        }
      }
      if (valCol === -1) return;

      var labels = rows.map(function(r) { return r[0] || ''; });
      var values = rows.map(function(r) { return parseFloat((r[valCol] || '0').replace(/,/g,'')) || 0; });
      var maxVal = Math.max.apply(null, values.map(Math.abs)) || 1;

      var canvas = canvasRef.current;
      var tip    = tipRef.current;
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

      // Color palette — matches mode color from SQL (indigo accent)
      var colText   = isDark ? '#8E9BB5' : '#5F6368';
      var colGrid   = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
      var colBg     = isDark ? '#1C2538' : '#F8F9FA';
      var barTop    = isDark ? '#818CF8' : '#5C6BC0';  // indigo
      var barBot    = isDark ? 'rgba(129,140,248,0.25)' : 'rgba(92,107,192,0.2)';
      var barHov    = isDark ? '#F96702' : '#F96702';  // orange on hover

      var H = 220;
      var dpr = window.devicePixelRatio || 1;

      function resize() {
        var W = canvas.parentElement ? canvas.parentElement.offsetWidth : 320;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width  = W + 'px';
        canvas.style.height = H + 'px';
        return W;
      }

      var padL = 8, padR = 8, padT = 28, padB = 36;
      var hoveredIdx = -1;

      // Store bar rects for hover hit-testing
      var barRects = [];

      function draw(progress) {
        var W = canvas.width / dpr;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;
        var n      = labels.length;
        var barW   = Math.max(4, Math.min(56, (chartW / n) - 8));
        var gap    = (chartW - barW * n) / (n + 1);
        var ctx    = canvas.getContext('2d');
        ctx.scale && ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Background
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = colBg;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(0, 0, W, H, 10); else ctx.rect(0, 0, W, H);
        ctx.fill();

        // Grid lines (3 horizontal at 33%, 66%, 100% of maxVal)
        ctx.strokeStyle = colGrid;
        ctx.lineWidth = 1;
        [0.33, 0.66, 1.0].forEach(function(frac) {
          var gy = padT + chartH - frac * chartH;
          ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(W - padR, gy); ctx.stroke();
          // Grid label
          var lv = (frac * maxVal);
          var lbl = lv >= 1e6 ? (lv/1e6).toFixed(1)+'M' : lv >= 1e3 ? (lv/1e3).toFixed(1)+'K' : lv.toFixed(0);
          ctx.fillStyle = colText;
          ctx.font = '500 9px system-ui, sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText(lbl, padL + 2, gy - 3);
        });

        // Column title
        ctx.fillStyle = colText;
        ctx.font = '600 10px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(headers[valCol].slice(0, 36), W / 2, 16);

        barRects = [];
        values.forEach(function(v, i) {
          var targetH = Math.max(2, (Math.abs(v) / maxVal) * chartH);
          var bh = targetH * progress;  // animated
          var bx = padL + gap * (i + 1) + barW * i;
          var by = padT + chartH - bh;
          barRects.push({ x:bx, y:by, w:barW, h:bh, label:labels[i], value:v });

          var isHov = i === hoveredIdx;
          // Gradient bar
          var grad = ctx.createLinearGradient(bx, by, bx, padT + chartH);
          grad.addColorStop(0, isHov ? barHov : barTop);
          grad.addColorStop(1, isHov ? 'rgba(249,103,2,0.25)' : barBot);
          ctx.fillStyle = grad;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(bx, by, barW, bh, [3,3,0,0]);
          else ctx.rect(bx, by, barW, bh);
          ctx.fill();

          // X-axis label
          ctx.fillStyle = isHov ? (isDark ? '#F96702' : '#C94F00') : colText;
          ctx.font = '500 9px system-ui, sans-serif';
          ctx.textAlign = 'center';
          var lbl2 = labels[i].length > 10 ? labels[i].slice(0,9)+'…' : labels[i];
          ctx.fillText(lbl2, bx + barW / 2, H - padB + 14);
        });
      }

      // Animate bars rising
      var start = null;
      var dur = 480;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      function animate(ts) {
        if (!start) start = ts;
        var p = Math.min((ts - start) / dur, 1);
        var ease = 1 - Math.pow(1 - p, 3); // ease-out-cubic
        draw(ease);
        if (p < 1) rafRef.current = requestAnimationFrame(animate);
      }
      resize();
      rafRef.current = requestAnimationFrame(animate);

      // Hover tooltip
      function onMove(e) {
        var rect = canvas.getBoundingClientRect();
        var mx = (e.clientX - rect.left);
        var my = (e.clientY - rect.top);
        var found = -1;
        for (var i = 0; i < barRects.length; i++) {
          var b = barRects[i];
          if (mx >= b.x - 4 && mx <= b.x + b.w + 4 && my >= b.y - 4 && my <= padT + (H - padT - padB)) {
            found = i; break;
          }
        }
        if (found !== hoveredIdx) {
          hoveredIdx = found;
          draw(1);
          if (tip) {
            if (found >= 0) {
              var bar = barRects[found];
              var fmtVal = bar.value >= 1e6 ? (bar.value/1e6).toFixed(2)+'M'
                         : bar.value >= 1e3 ? (bar.value/1e3).toFixed(1)+'K'
                         : bar.value.toLocaleString();
              tip.textContent = bar.label + ': ' + fmtVal;
              tip.style.opacity = '1';
              tip.style.left = (bar.x + bar.w/2 - tip.offsetWidth/2) + 'px';
              tip.style.top  = Math.max(4, bar.y - 28) + 'px';
            } else {
              tip.style.opacity = '0';
            }
          }
        }
      }
      function onLeave() {
        hoveredIdx = -1; draw(1);
        if (tip) tip.style.opacity = '0';
      }
      canvas.addEventListener('mousemove', onMove);
      canvas.addEventListener('mouseleave', onLeave);
      return function() {
        canvas.removeEventListener('mousemove', onMove);
        canvas.removeEventListener('mouseleave', onLeave);
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
      };
    }, [sc]);

    return html`
      <div ref=${wrapRef} style=${{ marginBottom:'8px' }}>
        <div className="chart-type-bar">
          ${hasGeo && html`<button className=${'chart-type-btn'+(chartType==='map'?' active':'')} onClick=${function(){setChartType('map');}}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style=${{marginRight:'3px',verticalAlign:'middle'}}>
              <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
              <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
            </svg>Map
          </button>`}
          ${['bar','table'].map(function(t) {
            return html`<button key=${t} className=${'chart-type-btn'+(chartType===t?' active':'')} onClick=${function(){setChartType(t);}}>${t.charAt(0).toUpperCase()+t.slice(1)}</button>`;
          })}
        </div>
        ${chartType === 'map' && html`<${MapChart} sc=${sc} valueLabel=${(function(){
          var firstLine = (sc && sc.table_markdown || '').trim().split('\n')[0] || '';
          var headers = firstLine.split('|').slice(1,-1).map(function(c){return c.trim();});
          var skipCols = new Set(['lat','lon','id','city','region','kota']);
          for (var i=0; i<headers.length; i++) { if (!skipCols.has(headers[i].toLowerCase())) return headers[i]; }
          return 'Value';
        })()}/>`}
        ${chartType !== 'map' && chartType !== 'table' && html`
          <div style=${{ position:'relative' }}>
            <canvas ref=${canvasRef} style=${{ width:'100%', borderRadius:'10px', cursor:'crosshair' }}/>
            <div ref=${tipRef} style=${{
              position:'absolute', pointerEvents:'none', opacity:'0',
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'4px 9px',
              fontSize:'0.7rem', fontFamily:'var(--mono)', color:'var(--t1)',
              boxShadow:'0 4px 12px rgba(0,0,0,0.15)', whiteSpace:'nowrap',
              transition:'opacity 0.1s',
            }}/>
          </div>`}
        ${chartType === 'table' && html`<div className="prose" dangerouslySetInnerHTML=${md(props.sc.table_markdown || '')}/>`}
      </div>`;
  }

  // ── SQL trace panel ────────────────────────────────────────────────
  function SqlPanel(props) {
    const [open, setOpen]   = useState(false);
    const [copied, setCopied] = useState(false);
    const sc = props.sc;
    function copy() {
      navigator.clipboard.writeText(sc.sql).then(function() {
        setCopied(true); setTimeout(function() { setCopied(false); }, 2000);
      });
    }
    return html`
      <div style=${{ border:'1px solid var(--sql-bd)', borderRadius:'8px', overflow:'hidden', background:'var(--surface)' }}>
        <button
          onClick=${function() { setOpen(!open); }}
          style=${{
            width:'100%', border:'none', padding:'8px 11px',
            background: open ? 'var(--i-dim)' : 'var(--surface)',
            display:'flex', alignItems:'center', gap:'7px',
            color:'var(--t1)', transition:'background 0.12s',
          }}
        >
          <${IcoDB}/>
          <span style=${{ fontSize:'0.77rem', fontWeight:500, flex:1, textAlign:'left', color:'var(--indigo)' }}>
            Structured Data · ${sc.row_count} rows · ${(function(){
              var ms = sc.latency_ms;
              if (ms == null) return html`<span style=${{color:'var(--t3)'}}>? ms</span>`;
              var color = ms < 100 ? 'var(--teal)' : ms < 500 ? 'var(--orange)' : 'var(--err)';
              return html`<span style=${{color}}>${ms.toFixed(1)} ms</span>`;
            })()}
          </span>
          <${IcoCaret} open=${open}/>
        </button>
        ${open && html`
          <div style=${{ padding:'12px', background:'var(--s2)', borderTop:'1px solid var(--sql-bd)' }}>
            <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'7px' }}>
              <span style=${{ fontSize:'0.63rem', color:'var(--t3)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Generated SQL</span>
              <button
                onClick=${copy}
                style=${{
                  background:'transparent', border:'1px solid var(--border)',
                  borderRadius:'4px', padding:'2px 8px',
                  color: copied ? 'var(--teal)' : 'var(--t3)', fontSize:'0.65rem',
                  transition:'color 0.15s',
                }}
              >${copied ? '✓ Copied' : 'Copy'}</button>
            </div>
            <pre style=${{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:'6px', padding:'9px 12px', overflowX:'auto', margin:'0 0 10px' }}>
              <code style=${{ fontFamily:'var(--mono)', fontSize:'0.76rem', color:'var(--indigo)', whiteSpace:'pre' }}>${sc.sql}</code>
            </pre>
            ${sc.table_markdown && sc.row_count >= 2 && (sc.row_count <= 12 || (function(){
              var h = (sc.table_markdown.trim().split('\n')[0]||'');
              return /\|\s*(city|region|province|kota|provinsi|wilayah)\s*\|/i.test(h) && sc.row_count <= 50;
            })()) && html`
              <${DataChart} sc=${sc}/>
            `}
            ${sc.table_markdown && html`
              <div style=${{ fontSize:'0.63rem', color:'var(--t3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'6px' }}>Results</div>
              <div className="prose" dangerouslySetInnerHTML=${md(sc.table_markdown)}/>
            `}
          </div>`}
      </div>`;
  }

  // ── Collapsible document citation list ────────────────────────────
  var _DOC_PREVIEW = 2;   // number of cards shown before "Show all" toggle
  function DocCitationList(props) {
    var cits = props.citations || [];
    var [showAll, setShowAll] = useState(false);
    var visible = (!showAll && cits.length > _DOC_PREVIEW) ? cits.slice(0, _DOC_PREVIEW) : cits;

    // Normalize scores within the batch so the relevance badge is meaningful
    // regardless of whether scores are raw RRF (~0.01) or already normalized (~0–1).
    var maxScore = Math.max.apply(null, cits.map(function(c){ return c.score || 0; })) || 1;
    var needsNorm = maxScore < 0.1;  // raw RRF scores are always < 0.1

    function normScore(c) {
      if (!c.score) return 0;
      return needsNorm ? c.score / maxScore : c.score;
    }

    return html`
      <div>
        <div style=${{
          fontSize:'0.63rem', color:'var(--t3)',
          textTransform:'uppercase', letterSpacing:'0.08em',
          display:'flex', alignItems:'center', gap:'5px', marginBottom:'7px',
        }}>
          <${IcoDoc}/> Source Documents · ${cits.length} found
        </div>
        ${visible.map(function(c, i) { return html`<${DocCard} key=${i} cit=${{ ...c, score: normScore(c) }} idx=${i+1} query=${props.question}/>`; })}
        ${cits.length > _DOC_PREVIEW && html`
          <button
            onClick=${function() { setShowAll(!showAll); }}
            style=${{
              marginTop:'5px', background:'transparent',
              border:'1px solid var(--border)', borderRadius:'6px',
              padding:'3px 10px', fontSize:'0.68rem', color:'var(--t2)',
              cursor:'pointer', transition:'all 0.15s',
            }}
            onMouseEnter=${function(e){ e.currentTarget.style.borderColor='var(--orange)'; e.currentTarget.style.color='var(--orange)'; }}
            onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)'; }}
          >
            ${showAll ? 'Hide' : 'Show all '+cits.length+' sources'}
          </button>
        `}
      </div>`;
  }

  // ── Chat messages ──────────────────────────────────────────────────
  function UserMsg(props) {
    return html`
      <div className="slide-up" style=${{ display:'flex', justifyContent:'flex-end', marginBottom:'16px' }}>
        <div style=${{
          maxWidth:'68%',
          background:'var(--msg-u-bg)',
          border:'1px solid var(--msg-u-bd)',
          borderRadius:'14px 14px 3px 14px',
          padding:'10px 15px',
          fontSize:'0.875rem', lineHeight:1.65, color:'var(--t1)',
        }}>${props.msg.content}</div>
      </div>`;
  }

  function AssistantMsg(props) {
    const msg = props.msg;
    const hasCits = (msg.docCitations && msg.docCitations.length > 0) || msg.sqlCitation;
    const hasDocCits = msg.docCitations && msg.docCitations.length > 0;
    const [copied, setCopied]     = useState(false);
    const [copiedFull, setCopiedFull] = useState(false);
    const [viewMode, setViewMode] = useState('ai');   // 'ai' | 'raw'

    function copyAnswer() {
      navigator.clipboard.writeText(msg.content || '').then(function() {
        setCopied(true); setTimeout(function() { setCopied(false); }, 2000);
      });
    }

    function copyWithSources() {
      var parts = [msg.content || ''];
      if (msg.docCitations && msg.docCitations.length) {
        parts.push('\n\n---\nSumber Dokumen:');
        msg.docCitations.forEach(function(c, i) {
          parts.push((i + 1) + '. ' + c.title + ' (chunk ' + (c.chunk_index + 1) + ')');
        });
      }
      if (msg.sqlCitation) {
        parts.push('\n---\nSQL: ' + msg.sqlCitation.sql);
      }
      navigator.clipboard.writeText(parts.join('\n')).then(function() {
        setCopiedFull(true); setTimeout(function() { setCopiedFull(false); }, 2000);
      });
    }
    // Derive left-accent class from mode
    var accentClass = msg.mode === 'document' ? 'msg-doc' : msg.mode === 'data' ? 'msg-data' : msg.mode === 'combined' ? 'msg-comb' : '';

    return html`
      <div className="slide-up" style=${{ marginBottom:'20px' }}>
        <div style=${{ display:'flex', alignItems:'center', gap:'4px', flexWrap:'wrap', marginBottom:'2px' }}>
          <${ModeBadge} mode=${msg.mode}/>
          <${GroundingBadge} msg=${msg}/>
          ${!msg.isStreaming && msg.docCitations && msg.docCitations.length > 0 && html`
            <button
              onClick=${function() { if(props.onViewSources) props.onViewSources(msg); }}
              title="View sources in side panel"
              style=${{
                marginLeft:'4px', background:'transparent', border:'1px solid var(--border)',
                borderRadius:'10px', padding:'1px 8px',
                fontSize:'0.62rem', color:'var(--t3)', cursor:'pointer',
                display:'flex', alignItems:'center', gap:'4px',

              }}
              onMouseEnter=${function(e){ e.currentTarget.style.borderColor='var(--teal)'; e.currentTarget.style.color='var(--teal)'; }}
              onMouseLeave=${function(e){ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t3)'; }}
            >
              <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="10" height="12" rx="1.5"/><path d="M6 6h4M6 9h3"/></svg>

            </button>
          `}
        </div>
        ${msg.isAgent
          ? html`<${AgentResearch} msg=${msg}/>`
          : msg.isDebate
          ? html`<${DebatePanel} msg=${msg}/>`

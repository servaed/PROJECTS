<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudera AI — Enterprise Assistant</title>

  <!-- Anti-FOUC: apply stored theme before first paint -->
  <script>
    (function(){
      var t = localStorage.getItem('cld-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Fonts: Google Fonts with local system-font fallback for offline use -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Google+Sans+Display:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Vendor JS — self-hosted for offline/restricted-network resilience -->
  <script src="/static/vendor/react.production.min.js"></script>
  <script src="/static/vendor/react-dom.production.min.js"></script>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/purify.min.js"></script>
  <script src="/static/vendor/htm.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── Design tokens — LIGHT (default) ───────────────────────────── */
    :root {
      /* Surfaces */
      --bg:          #F8F9FA;
      --surface:     #FFFFFF;
      --s2:          #F1F3F4;
      --s3:          #E8EAED;
      --s4:          #DADCE0;

      /* Borders */
      --border:      #DADCE0;
      --border-soft: rgba(0,0,0,0.06);

      /* Brand */
      --orange:      #F96702;
      --o-dim:       rgba(249,103,2,0.08);
      --o-glow:      rgba(249,103,2,0.18);
      --o-text:      #C94F00;        /* darker shade for light bg legibility */
      --teal:        #00796B;
      --t-dim:       rgba(0,121,107,0.08);
      --indigo:      #5C6BC0;
      --i-dim:       rgba(92,107,192,0.08);

      /* Text */
      --t1:          #202124;
      --t2:          #5F6368;
      --t3:          #9AA0A6;

      /* Status */
      --ok:          #34A853;
      --ok-glow:     rgba(52,168,83,0.4);
      --err:         #EA4335;
      --err-glow:    rgba(234,67,53,0.4);

      /* Chat messages */
      --msg-u-bg:    rgba(249,103,2,0.07);
      --msg-u-bd:    rgba(249,103,2,0.2);
      --msg-a-bg:    #FFFFFF;
      --msg-a-bd:    #DADCE0;
      --msg-a-shadow:0 1px 4px rgba(0,0,0,0.07);

      /* Input */
      --inp-bg:      #FFFFFF;
      --inp-bd:      #DADCE0;

      /* Code */
      --code-bg:     #F1F3F4;
      --code-color:  #C94F00;
      --pre-bg:      #F8F9FA;

      /* Sidebar data-color */
      --sql-color:   #5C6BC0;
      --sql-bd:      rgba(92,107,192,0.22);

      /* Logo filter — convert logo to Cloudera orange (#F96702) in light mode */
      --logo-filter: brightness(0) saturate(100%) invert(43%) sepia(97%) saturate(739%) hue-rotate(346deg) brightness(103%) contrast(103%);

      /* Thinking dots */
      --dot-color:   #9AA0A6;

      /* Topbar */
      --topbar-bg:   #FFFFFF;
      --topbar-bd:   #DADCE0;

      /* Sidebar */
      --sidebar-bg:  #FFFFFF;
      --sidebar-bd:  rgba(0,0,0,0.13);

      /* Prompt button */
      --prompt-hover-bg: rgba(249,103,2,0.07);
      --prompt-hover-bd: rgba(249,103,2,0.25);
      --prompt-hover-c:  #202124;

      /* Typography */
      --font:        'Google Sans', 'Plus Jakarta Sans', system-ui, sans-serif;
      --display:     'Google Sans Display', 'Google Sans', system-ui, sans-serif;
      --mono:        'JetBrains Mono', monospace;

      /* Layout */
      --topbar-h:    64px;
      --sidebar-w:   260px;
    }

    /* ── Design tokens — DARK ───────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:          #0D1117;
      --surface:     #161C27;
      --s2:          #1C2538;
      --s3:          #232E44;
      --s4:          #2C3A54;

      --border:      rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.04);

      --o-dim:       rgba(249,103,2,0.10);
      --o-glow:      rgba(249,103,2,0.22);
      --o-text:      #F96702;
      --teal:        #00A591;
      --t-dim:       rgba(0,165,145,0.09);
      --indigo:      #818CF8;
      --i-dim:       rgba(129,140,248,0.09);

      --t1:          #E8EDF5;
      --t2:          #8E9BB5;
      --t3:          #4A5470;

      --msg-u-bg:    rgba(249,103,2,0.10);
      --msg-u-bd:    rgba(249,103,2,0.22);
      --msg-a-bg:    #161C27;
      --msg-a-bd:    rgba(255,255,255,0.09);
      --msg-a-shadow:none;

      --inp-bg:      #0D1117;
      --inp-bd:      rgba(255,255,255,0.10);

      --code-bg:     #1C2538;
      --code-color:  #FF8533;
      --pre-bg:      #0D1117;

      --sql-color:   #818CF8;
      --sql-bd:      rgba(129,140,248,0.2);

      /* Same orange filter in dark mode — logo stays Cloudera orange */
      --logo-filter: brightness(0) saturate(100%) invert(43%) sepia(97%) saturate(739%) hue-rotate(346deg) brightness(103%) contrast(103%);

      --dot-color:   #4A5470;

      --topbar-bg:   #161C27;
      --topbar-bd:   rgba(255,255,255,0.08);

      --sidebar-bg:  #131921;
      --sidebar-bd:  rgba(255,255,255,0.12);

      --prompt-hover-bg: rgba(249,103,2,0.09);
      --prompt-hover-bd: rgba(249,103,2,0.28);
      --prompt-hover-c:  #E8EDF5;
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background:  var(--bg);
      color:       var(--t1);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s, color 0.2s;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── Smooth theme transitions (structural elements only) ────────── */
    header, aside, .surface-transition {
      transition: background-color 0.2s, border-color 0.2s;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* ── Cloudera logo image ────────────────────────────────────────── */
    .cld-logo {
      display: block;
      object-fit: contain;
      filter: var(--logo-filter);
      transition: filter 0.2s;
    }

    /* ── Markdown prose (theme-aware) ───────────────────────────────── */
    .prose { line-height: 1.75; font-size: 0.875rem; color: var(--t1); }
    .prose p { margin-bottom: 0.65em; }
    .prose p:last-child { margin-bottom: 0; }
    .prose strong { font-weight: 600; color: var(--t1); }
    .prose em { font-style: italic; color: var(--t2); }
    .prose ul, .prose ol { padding-left: 1.3em; margin-bottom: 0.65em; }
    .prose li { margin-bottom: 0.2em; color: var(--t1); }
    .prose h1,.prose h2,.prose h3 {
      font-family: var(--display); color: var(--t1);
      margin: 0.9em 0 0.4em;
    }
    .prose code {
      font-family: var(--mono); font-size: 0.8em;
      background: var(--code-bg); color: var(--code-color);
      padding: 1px 5px; border-radius: 4px;
    }
    .prose pre {
      background: var(--pre-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      overflow-x: auto; margin: 0.75em 0;
    }
    .prose pre code { background: none; color: var(--t2); padding: 0; }
    .prose table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 0.82rem; }
    .prose th {
      background: var(--s2); color: var(--t2); font-weight: 600;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .prose td { padding: 6px 12px; border-bottom: 1px solid var(--border); color: var(--t1); }
    .prose tr:last-child td { border-bottom: none; }
    .prose blockquote {
      border-left: 3px solid var(--orange); padding: 4px 14px;
      color: var(--t2); font-style: italic; margin: 0.7em 0;
    }
    .prose a { color: var(--o-text); text-decoration: underline; }
    .cite-icon { display:inline-flex; align-items:center; font-size:0.6rem; font-weight:700;
      padding:1px 5px; border-radius:8px; margin:0 2px; vertical-align:middle; line-height:1.5;
      letter-spacing:0.02em; }
    .cite-dok  { background:var(--t-dim); color:var(--teal); }
    .cite-dat  { background:var(--i-dim); color:var(--indigo); }

    /* ── Animations ─────────────────────────────────────────────────── */
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes dotpulse { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.65)} }

    .slide-up { animation: slideUp 0.22s ease forwards; }
    .cursor   {
      display: inline-block; width: 2px; height: 0.9em;
      background: var(--orange); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    .spin {
      width: 15px; height: 15px;
      border: 2px solid var(--border); border-top-color: var(--orange);
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    .dot { animation: dotpulse 1.4s ease-in-out infinite; }

    /* ── GCP-style nav item (sidebar prompt buttons) ────────────────── */
    .nav-item {
      display: flex; align-items: center; gap: 6px;
      width: 100%; border: none; background: transparent;
      padding: 7px 10px 7px 14px;
      border-radius: 0 24px 24px 0;
      margin-right: 12px;
      color: var(--t2); font-size: 0.78rem; font-family: var(--font);
      text-align: left; cursor: pointer; line-height: 1.45;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover {
      background: var(--prompt-hover-bg);
      color: var(--prompt-hover-c);
    }
    .nav-item .nav-arrow {
      flex-shrink: 0; opacity: 0; font-size: 0.7rem; color: var(--orange);
      transition: opacity 0.12s, transform 0.12s;
      transform: translateX(-4px);
    }
    .nav-item:hover .nav-arrow {
      opacity: 1; transform: translateX(0);
    }

    /* ── Section label ──────────────────────────────────────────────── */
    .sec-label {
      font-size: 0.62rem; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 14px 16px 6px;
    }

    button { cursor: pointer; font-family: var(--font); }
    button:disabled { cursor: default; }
    textarea { font-family: var(--font); }

    /* ── First-launch setup overlay ──────────────────────────────────── */
    .setup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .setup-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 40px; max-width: 460px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
      text-align: center;
    }
    .setup-card h2 {
      font-family: var(--display); font-size: 1.4rem; font-weight: 700;
      color: var(--t1); margin: 14px 0 10px; letter-spacing: -0.02em;
    }
    .setup-card p {
      font-size: 0.875rem; color: var(--t2); line-height: 1.7; margin-bottom: 24px;
    }
    .setup-steps {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 28px; text-align: left;
    }
    .setup-step {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.82rem; color: var(--t1); line-height: 1.5;
    }
    .setup-step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--o-dim); border: 1.5px solid rgba(249,103,2,0.3);
      color: var(--o-text); font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  'use strict';

  const { useState, useEffect, useRef, useCallback, useReducer } = React;
  const { createRoot } = ReactDOM;
  const html = htm.bind(React.createElement);

  marked.setOptions({ breaks: true, gfm: true });
  // Sanitize LLM output before rendering to prevent XSS from prompt-injected HTML
  const md = (text) => {
    var t = (text || '')
      .replace(/\[dokumen\]/g, '<span class="cite-icon cite-dok">◈</span>')
      .replace(/\[data\]/g,    '<span class="cite-icon cite-dat">⬡</span>');
    return { __html: DOMPurify.sanitize(marked.parse(t)) };
  };

  // Highlight query keywords in source chunk text (plain-text input → safe HTML output)
  function highlightHtml(text, query) {
    if (!text) return '';
    // HTML-escape raw text first to prevent injection before we add <mark> tags
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    if (!query) return safe;
    var words = query.trim().split(/\s+/).filter(function(w){ return w.length >= 3; });
    if (!words.length) return safe;
    var pats = words.map(function(w){ return w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); });
    return safe.replace(
      new RegExp('('+pats.join('|')+')','gi'),
      '<mark style="background:rgba(249,103,2,0.25);color:inherit;border-radius:2px;padding:0 1px">$1</mark>'
    );
  }

  // ── Theme management ───────────────────────────────────────────────
  const THEME_KEY = 'cld-theme';
  function getTheme() {
    return localStorage.getItem(THEME_KEY) ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }
  function setThemeAttr(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(THEME_KEY, t);
  }

  // ── Mode config ────────────────────────────────────────────────────
  const MODES = {
    dokumen:  { label: 'Document RAG',    color: 'var(--teal)',   dim: 'var(--t-dim)', icon: '◈' },
    data:     { label: 'Structured Data', color: 'var(--indigo)', dim: 'var(--i-dim)', icon: '⬡' },
    gabungan: { label: 'Combined',        color: 'var(--orange)', dim: 'var(--o-dim)', icon: '⬡' },
  };
  const getMode = (m) => MODES[m] || { label: m || '', color: 'var(--t2)', dim: 'var(--border-soft)', icon: '·' };

  // ── Message reducer ────────────────────────────────────────────────
  function reduce(msgs, a) {
    switch (a.type) {
      case 'USER':      return [...msgs, { id:a.id, role:'user', content:a.content }];
      case 'ASSISTANT': return [...msgs, { id:a.id, role:'assistant', content:'', mode:null, isStreaming:true, docCitations:[], sqlCitation:null, usage:null, error:null, question:a.question||'' }];
      case 'MODE':      return msgs.map(m => m.id===a.id ? Object.assign({},m,{mode:a.mode}) : m);
      case 'TOKEN':     return msgs.map(m => m.id===a.id ? Object.assign({},m,{content:m.content+a.text,isThinking:false}) : m);
      case 'THINKING':  return msgs.map(m => m.id===a.id ? Object.assign({},m,{isThinking:a.active}) : m);
      case 'DONE':      return msgs.map(m => m.id===a.id ? Object.assign({},m,{isStreaming:false,isThinking:false,docCitations:a.docCitations,sqlCitation:a.sqlCitation,usage:a.usage,latency_ms:a.latency_ms||null}) : m);
      case 'ERROR':     return msgs.map(m => m.id===a.id ? Object.assign({},m,{isStreaming:false,error:a.message}) : m);
      case 'RESET':     return [];
      default:          return msgs;
    }
  }

  // ── SSE over POST ──────────────────────────────────────────────────
  async function* ssePost(url, body) {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const blocks = buf.split('\n\n');
      buf = blocks.pop();
      for (const block of blocks) {
        if (!block.trim()) continue;
        let event = 'message', data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: '))  event = line.slice(7).trim();
          else if (line.startsWith('data: ')) data  = line.slice(6);
        }
        if (data !== null) yield { event, data: JSON.parse(data) };
      }
    }
  }

  // ── Icons ──────────────────────────────────────────────────────────
  function IcoSend() {
    return html`<svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M18 10L4 4l3 6-3 6Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
  }
  function IcoDoc() {
    return html`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M6 6h4M6 9h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
  }
  function IcoDB() {
    return html`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="4.5" rx="5" ry="2" stroke="currentColor" stroke-width="1.3"/><path d="M3 4.5v7c0 1.1 2.24 2 5 2s5-.9 5-2v-7" stroke="currentColor" stroke-width="1.3"/><path d="M3 8c0 1.1 2.24 2 5 2s5-.9 5-2" stroke="currentColor" stroke-width="1.1"/></svg>`;
  }
  function IcoCaret(props) {
    return html`<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style=${{ transition:'transform 0.18s', transform:props.open?'rotate(90deg)':'rotate(0deg)' }}><path d="M4 2.5l4 3.5-4 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
  function IcoSun() {
    return html`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  }
  function IcoMoon() {
    return html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  function IcoTrash() {
    return html`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M5 4V3h6v1M6 7v5M10 7v5M3 4l1 9h8l1-9"/></svg>`;
  }
  function IcoCopy() {
    return html`<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2"/></svg>`;
  }

  // ── Cloudera logo image ────────────────────────────────────────────
  function CldLogo(props) {
    const h = props.height || 20;
    return html`
      <img
        src="/static/cloudera-logo.png"
        alt="Cloudera"
        className="cld-logo"
        style=${{ height:h+'px', width:'auto' }}
      />`;
  }

  // ── Theme toggle button ────────────────────────────────────────────
  function ThemeToggle(props) {
    const isDark = props.theme === 'dark';
    return html`
      <button
        onClick=${props.onToggle}
        title=${isDark ? 'Switch to light mode' : 'Switch to dark mode'}
        style=${{
          width:'34px', height:'34px', borderRadius:'8px',
          border:'1px solid var(--border)',
          background:'var(--s2)',
          color:'var(--t2)',
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'all 0.15s', flexShrink:0,
        }}
        onMouseEnter=${e => { e.currentTarget.style.background='var(--s3)'; e.currentTarget.style.color='var(--t1)'; }}
        onMouseLeave=${e => { e.currentTarget.style.background='var(--s2)'; e.currentTarget.style.color='var(--t2)'; }}
      >${isDark ? html`<${IcoSun}/>` : html`<${IcoMoon}/>`}</button>`;
  }

  // ── Top bar (GCP-style) ────────────────────────────────────────────
  function TopBar(props) {
    const selStyle = {
      height:'34px', padding:'0 8px 0 10px', borderRadius:'8px',
      border:'1px solid var(--border)', background:'var(--s2)',
      color:'var(--t1)', fontSize:'0.75rem', fontWeight:500,
      cursor:'pointer', outline:'none', flexShrink:0,
    };
    return html`
      <header style=${{

  // ── DataChart: canvas bar chart for SQL results (2–12 rows) ───────
  function DataChart(props) {
    var canvasRef = useRef(null);
    var sc = props.sc;

    useEffect(function() {
      if (!sc || !sc.table_markdown || !canvasRef.current) return;
      var lines = sc.table_markdown.trim().split('\n').filter(function(l) { return l.trim().startsWith('|'); });
      if (lines.length < 3) return;

      function parseCells(line) {
        return line.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      }
      var headers = parseCells(lines[0]);
      var rows    = lines.slice(2).map(parseCells);
      if (!rows.length || headers.length < 2) return;

      // Find the first numeric column (skip the label column)
      var valCol = -1;
      for (var ci = 1; ci < headers.length; ci++) {
        if (rows.some(function(r) { return r[ci] && !isNaN(parseFloat((r[ci] || '').replace(/,/g, ''))); })) {
          valCol = ci; break;
        }
      }
      if (valCol === -1) return;

      var labels = rows.map(function(r) { return r[0] || ''; });
      var values = rows.map(function(r) { return parseFloat((r[valCol] || '0').replace(/,/g, '')) || 0; });

      var canvas = canvasRef.current;
      var dpr = window.devicePixelRatio || 1;
      var W   = canvas.offsetWidth || 320;
      var H   = 150;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      var isDark  = document.documentElement.getAttribute('data-theme') === 'dark';
      var colText = isDark ? '#8E9BB5' : '#5F6368';
      var colBar  = isDark ? '#818CF8' : '#5C6BC0';
      var colBg   = isDark ? '#1C2538' : '#F1F3F4';

      // Background
      ctx.fillStyle = colBg;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(0, 0, W, H, 8); else ctx.rect(0, 0, W, H);
      ctx.fill();

      var padL = 10, padR = 10, padT = 22, padB = 28;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;
      var n      = labels.length;
      var maxVal = Math.max.apply(null, values.map(Math.abs)) || 1;
      var barW   = Math.max(4, Math.min(48, (chartW / n) - 6));
      var gap    = (chartW - barW * n) / (n + 1);

      // Column title
      ctx.fillStyle = colText;
      ctx.font = '600 9px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(headers[valCol].slice(0, 32), W / 2, 14);

      values.forEach(function(v, i) {
        var bh = Math.max(2, (Math.abs(v) / maxVal) * chartH);
        var bx = padL + gap * (i + 1) + barW * i;
        var by = padT + chartH - bh;

        ctx.fillStyle = colBar;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(bx, by, barW, bh, [3, 3, 0, 0]); else ctx.rect(bx, by, barW, bh);
        ctx.fill();

        // X-axis label
        ctx.fillStyle = colText;
        ctx.font = '8px system-ui, sans-serif';
        ctx.textAlign = 'center';
        var lbl = labels[i].length > 9 ? labels[i].slice(0, 8) + '…' : labels[i];
        ctx.fillText(lbl, bx + barW / 2, H - padB + 12);
      });
    }, [sc]);

    return html`<canvas ref=${canvasRef} style=${{ width:'100%', display:'block', borderRadius:'8px', marginBottom:'8px' }}/>`;
  }

  // ── Input bar ──────────────────────────────────────────────────────
  function InputBar(props) {
    const [val, setVal] = useState('');
    const taRef         = useRef(null);

    useEffect(function() {
      if (props.prefill) {
        setVal(props.prefill); props.onPrefillDone();
        if (taRef.current) taRef.current.focus();
      }
    }, [props.prefill]);

    useEffect(function() {
      var ta = taRef.current;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(Math.max(ta.scrollHeight, 38), 160) + 'px';
    }, [val]);

    function submit() {
      var q = val.trim();
      if (!q || props.disabled) return;
      setVal('');
      if (taRef.current) taRef.current.style.height = 'auto';
      props.onSubmit(q);
    }

    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    }

    var active = val.trim() !== '' && !props.disabled;

    return html`
      <div style=${{
        padding:'16px 36px 20px',
        borderTop:'1px solid var(--border)',
        background:'var(--surface)',
        boxShadow:'0 -6px 24px rgba(0,0,0,0.06)',
        flexShrink:0,
      }}>
        <div
          style=${{
            display:'flex', alignItems:'center', gap:'10px',
            background:'var(--inp-bg)',
            border:'1px solid var(--inp-bd)',

            transition:'border-color 0.2s, box-shadow 0.2s',
            boxShadow:'0 2px 8px rgba(0,0,0,0.05)',

          onFocusCapture=${function(e) {
            e.currentTarget.style.borderColor = 'var(--orange)';
            e.currentTarget.style.boxShadow   = '0 0 0 3px var(--o-dim)';
          }}
          onBlurCapture=${function(e) {
            e.currentTarget.style.borderColor = 'var(--inp-bd)';
            e.currentTarget.style.boxShadow   = 'var(--msg-a-shadow)';
          }}
        >
          <textarea
            ref=${taRef}
            value=${val}
            onInput=${function(e) { setVal(e.target.value); }}
            onKeyDown=${onKey}
            placeholder="Ask about your enterprise documents and data…"
            disabled=${props.disabled}
            rows="1"
            style=${{
              flex:1, background:'transparent', border:'none', outline:'none',

              color:'var(--t1)', fontSize:'0.875rem', lineHeight:1.65,

            onClick=${submit}
            disabled=${!active}
            style=${{
              flexShrink:0, width:'34px', height:'34px',
              borderRadius:'8px', border:'none',
              background: active ? 'var(--orange)' : 'var(--s3)',
              color: active ? '#fff' : 'var(--t3)',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.15s',
              boxShadow: active ? '0 2px 8px var(--o-glow)' : 'none',

              padding:'10px 24px', borderRadius:'8px',
              background:'var(--orange)', color:'#fff',
              fontSize:'0.85rem', fontWeight:600,
              textDecoration:'none', display:'inline-block',
              boxShadow:'0 2px 8px rgba(249,103,2,0.35)',
            }}>⚙ Settings → LLM</a>
            <button
              onClick=${props.onDismiss}
              style=${{
                padding:'10px 20px', borderRadius:'8px',
                border:'1px solid var(--border)', background:'var(--s2)',
                color:'var(--t2)', fontSize:'0.85rem', cursor:'pointer',
              }}
            >Continue anyway</button>
          </div>
        </div>
      </div>`;
  }

  // ── App root ───────────────────────────────────────────────────────
  function App() {
    var _SS_KEY = 'cld-chat';
    var _SS_VER = 3;   // bump when message shape changes to avoid corrupt history
    const [msgs, dispatch]              = useReducer(reduce, [], function() {
      try {
        var raw = localStorage.getItem(_SS_KEY);
        if (raw) {
          var stored = JSON.parse(raw);
          // Reject storage written by an older schema version
          if (!stored || stored._v !== _SS_VER || !Array.isArray(stored.msgs)) return [];
          // Ensure no message is left mid-stream after a page reload
          return stored.msgs.map(function(m) {
            return m.isStreaming ? Object.assign({},m,{isStreaming:false,isThinking:false}) : m;
          });
        }
      } catch(e) {}
      return [];
    });
    const [status, setStatus]           = useState(null);
    const [samples, setSamples]         = useState([]);
    const [loading, setLoading]         = useState(false);
    const [prefill, setPrefill]         = useState(null);
    const [theme, setTheme]             = useState(getTheme);
    const [domain, setDomain]           = useState('banking');
    const [language, setLanguage]       = useState('id');
    const [domains, setDomains]         = useState([
      {id:'banking',label:'Banking'},{id:'telco',label:'Telco'},{id:'government',label:'Government'}
    ]);
    const [showSetupOverlay, setShowSetupOverlay] = useState(false);
    const [isAutoPlaying, setIsAutoPlaying]   = useState(false);
    const [isAutoPaused,  setIsAutoPaused]    = useState(false);
    const [autoPlayIdx,   setAutoPlayIdx]     = useState(0);
    // Refs so auto-play setTimeout callbacks always read latest state/fn
    const autoPlayRef     = useRef(false);
    const autoPausedRef   = useRef(false);
    const pausedAtIdxRef  = useRef(0);
    const playNextRef     = useRef(null);
    const samplesRef      = useRef([]);
    const handleSubmitRef = useRef(null);
    const domainRef       = useRef(domain);
    const languageRef     = useRef(language);

    // Apply theme to <html> whenever it changes
    useEffect(function() { setThemeAttr(theme); }, [theme]);

    // Persist chat to localStorage so conversations survive tab close and reload
    useEffect(function() {
      try { localStorage.setItem(_SS_KEY, JSON.stringify({_v: _SS_VER, msgs: msgs})); } catch(e) {}
    }, [msgs]);

    // Keep refs in sync
    useEffect(function() { samplesRef.current = samples; }, [samples]);
    useEffect(function() { domainRef.current = domain; }, [domain]);
    useEffect(function() { languageRef.current = language; }, [language]);

    // On first load: redirect to /configure?setup=1 if LLM is not configured
    useEffect(function() {
      fetch('/health', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(h) {
          if (h.checks && !h.checks.llm_configured) {
            window.location.href = '/configure?setup=1';
          }
        })
        .catch(function() {}); // silently ignore during startup
    }, []);

    // Fetch status and available domains; poll every 30s for sidebar indicators
    useEffect(function() {
      function ls() {
        fetch('/api/status').then(function(r){return r.json();}).then(function(s) {
          setStatus(s);
        }).catch(console.error);
      }
      fetch('/api/domains').then(function(r){return r.json();}).then(setDomains).catch(console.error);
      ls();
      var iv = setInterval(ls, 30000);
      return function() { clearInterval(iv); };
    }, []);

    // Re-fetch samples whenever domain or language changes; also reset auto-play
    useEffect(function() {
      stopAutoPlay();
      setSamples([]);
      fetch('/api/samples?domain='+domain+'&lang='+language)
        .then(function(r){return r.json();})
        .then(setSamples)
        .catch(console.error);
    }, [domain, language]);

    const handleSubmit = useCallback(function(question, _onDone) {
      var uid = Date.now();
      var aid = uid + 1;
      var t0  = Date.now();
      var history = msgs
        .filter(function(m) { return m.content; })
        .map(function(m) { return { role:m.role, content:m.content }; });

      dispatch({ type:'USER',      id:uid, content:question });
      dispatch({ type:'ASSISTANT', id:aid, question:question });
      setLoading(true);

      var gotDone = false;
      async function run() {
        try {
          for await (var ev of ssePost('/api/chat', { question:question, history:history, domain:domainRef.current, language:languageRef.current })) {
            if (ev.event==='mode')     { dispatch({ type:'MODE',     id:aid, mode:ev.data.mode });                                                              setLoading(false); }
            if (ev.event==='token')    { dispatch({ type:'TOKEN',    id:aid, text:ev.data.text }); }
            if (ev.event==='thinking') { dispatch({ type:'THINKING', id:aid, active:ev.data.active }); }
            if (ev.event==='done')     { dispatch({ type:'DONE',     id:aid, docCitations:ev.data.doc_citations, sqlCitation:ev.data.sql_citation, usage:ev.data.usage||null, latency_ms:Date.now()-t0 }); gotDone=true; }
            if (ev.event==='error')    { dispatch({ type:'ERROR',    id:aid, message:ev.data.message }); gotDone=true; }
          }
        } catch(err) {
          dispatch({ type:'ERROR', id:aid, message:err.message });
        } finally {
          if (!gotDone) dispatch({ type:'DONE', id:aid, docCitations:[], sqlCitation:null });
          setLoading(false);
          if (_onDone) _onDone();
        }
      }
      run();
    }, [msgs]);

    // Keep handleSubmitRef in sync — useCallback rebuilds when msgs changes,
    // so auto-play callbacks must reference this ref to avoid stale closures
    useEffect(function() { handleSubmitRef.current = handleSubmit; }, [handleSubmit]);

    // ── Auto-play: run every sample prompt sequentially ───────────────
    function startAutoPlay() {
      if (!samplesRef.current.length || autoPlayRef.current) return;
      autoPlayRef.current   = true;
      autoPausedRef.current = false;
      setIsAutoPlaying(true);
      setIsAutoPaused(false);
      setAutoPlayIdx(0);

      function playNext(idx) {
        if (!autoPlayRef.current) return;
        var samps = samplesRef.current;
        if (idx >= samps.length) {
          autoPlayRef.current = false;
          setIsAutoPlaying(false);
          setIsAutoPaused(false);
          return;
        }
        setAutoPlayIdx(idx);
        var q = typeof samps[idx] === 'string' ? samps[idx] : samps[idx].text;
        handleSubmitRef.current(q, function() {
          if (!autoPlayRef.current) return;
          if (autoPausedRef.current) { pausedAtIdxRef.current = idx + 1; return; }
          // Brief pause between questions so the audience can read each answer
          setTimeout(function() { playNext(idx + 1); }, 3000);
        });
      }

      playNextRef.current = playNext;
      playNext(0);
    }

    function pauseAutoPlay() {
      autoPausedRef.current = true;
      setIsAutoPaused(true);
    }

    function resumeAutoPlay() {
      if (!autoPlayRef.current || !autoPausedRef.current) return;
      autoPausedRef.current = false;
      setIsAutoPaused(false);
      if (playNextRef.current) playNextRef.current(pausedAtIdxRef.current);
    }

    function stopAutoPlay() {
      autoPlayRef.current   = false;
      autoPausedRef.current = false;
      setIsAutoPlaying(false);
      setIsAutoPaused(false);
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────
    useEffect(function() {
      function onKeyDown(e) {
        // Ctrl+Shift+D — toggle demo (start / stop auto-play)
        if (e.ctrlKey && e.shiftKey && e.key === 'D') {
          e.preventDefault();
          if (isAutoPlaying) stopAutoPlay(); else startAutoPlay();
        }
        // Ctrl+K — clear conversation
        if (e.ctrlKey && !e.shiftKey && (e.key === 'k' || e.key === 'K')) {
          e.preventDefault();
          stopAutoPlay();
          dispatch({ type:'RESET' });
          try { localStorage.removeItem(_SS_KEY); } catch(err) {}
        }
        // Ctrl+Shift+R — full demo reset
        if (e.ctrlKey && e.shiftKey && e.key === 'R') {
          e.preventDefault();
          stopAutoPlay();
          setDomain('banking');
          setLanguage('id');
          dispatch({ type:'RESET' });
          try { localStorage.removeItem(_SS_KEY); } catch(err) {}
        }
        // Escape — stop demo if playing
        if (e.key === 'Escape' && isAutoPlaying) {
          stopAutoPlay();
        }
      }
      window.addEventListener('keydown', onKeyDown);
      return function() { window.removeEventListener('keydown', onKeyDown); };
    }, [isAutoPlaying, isAutoPaused]);

    return html`
      <div style=${{ display:'flex', flexDirection:'column', width:'100vw', height:'100vh', overflow:'hidden' }}>
        <${SetupOverlay}
          show=${showSetupOverlay}
          onDismiss=${function() {
            setShowSetupOverlay(false);
            try { sessionStorage.setItem('cld-overlay-dismissed', '1'); } catch(e) {}
          }}
        />
        <!-- GCP-style top bar (full width) -->
        <${TopBar}
          theme=${theme}
          onToggle=${function() { setTheme(function(t){ return t==='dark'?'light':'dark'; }); }}
          onReset=${function() { stopAutoPlay(); dispatch({ type:'RESET' }); try { localStorage.removeItem(_SS_KEY); } catch(e){} }}
          domain=${domain}
          domains=${domains}
          onDomainChange=${function(d) { setDomain(d); }}
          language=${language}
          onLanguageChange=${function(l) { setLanguage(l); }}
          isAutoPlaying=${isAutoPlaying}
          isAutoPaused=${isAutoPaused}
          autoPlayIdx=${autoPlayIdx}
          autoPlayTotal=${samples.length}
          onStartAutoPlay=${startAutoPlay}
          onPauseAutoPlay=${pauseAutoPlay}
          onResumeAutoPlay=${resumeAutoPlay}
          onStopAutoPlay=${stopAutoPlay}
        />

        <!-- Body: sidebar + main -->
        <div style=${{ flex:1, display:'flex', overflow:'hidden' }}>
          <${Sidebar}
            status=${status}
            samples=${samples}
            onPick=${function(p) { if (!isAutoPlaying && !loading) setPrefill(p); }}
            isAutoPlaying=${isAutoPlaying}
            isAutoPaused=${isAutoPaused}
            autoPlayIdx=${autoPlayIdx}
            autoPlayTotal=${samples.length}
            onStartAutoPlay=${startAutoPlay}
            onPauseAutoPlay=${pauseAutoPlay}
            onResumeAutoPlay=${resumeAutoPlay}
            onStopAutoPlay=${stopAutoPlay}
            domain=${domain}
            domains=${domains}
            language=${language}
            onDomainChange=${function(d) { setDomain(d); }}
            onLanguageChange=${function(l) { setLanguage(l); }}
            onFullReset=${function() {
              stopAutoPlay();
              setDomain('banking');
              setLanguage('id');
              dispatch({ type:'RESET' });
              try { localStorage.removeItem(_SS_KEY); } catch(e) {}
            }}
          />
          <!-- Main: chat + input -->
          <div style=${{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <${ChatWindow} msgs=${msgs} isLoading=${loading} domain=${domain} samples=${samples} onPick=${function(p) { if (!isAutoPlaying && !loading) setPrefill(p); }}/>
            <${InputBar}
              onSubmit=${handleSubmit}
              disabled=${loading || isAutoPlaying}
              prefill=${prefill}
              onPrefillDone=${function() { setPrefill(null); }}
            />
          </div>
        </div>
      </div>`;
  }

  createRoot(document.getElementById('root')).render(html`<${App}/>`);
})();
</script>
</body>
</html>

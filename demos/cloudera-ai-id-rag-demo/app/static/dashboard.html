<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cloudera AI — Executive Dashboard</title>
  <script>
    (function(){
      var t = localStorage.getItem('cld-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    :root {
      --bg: #F8F9FA; --surface: #FFFFFF; --s2: #F1F3F4; --s3: #E8EAED;
      --border: #DADCE0;
      --orange: #F96702; --o-dim: rgba(249,103,2,0.08); --o-text: #C94F00;
      --teal: #00796B; --t-dim: rgba(0,121,107,0.08);
      --indigo: #5C6BC0; --i-dim: rgba(92,107,192,0.08);
      --t1: #202124; --t2: #5F6368; --t3: #9AA0A6;
      --ok: #34A853; --warn: #FBBC04; --err: #EA4335;
      --font: 'Google Sans', system-ui, sans-serif;
      --display: 'Google Sans Display', 'Google Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --logo-filter: brightness(0) saturate(100%) invert(43%) sepia(97%) saturate(739%) hue-rotate(346deg) brightness(103%) contrast(103%);
    }
    [data-theme="dark"] {
      --bg: #0D1117; --surface: #161C27; --s2: #1C2538; --s3: #232E44;
      --border: rgba(255,255,255,0.08);
      --o-text: #F96702; --teal: #00A591; --indigo: #818CF8;
      --t1: #E8EDF5; --t2: #8E9BB5; --t3: #4A5470;
      --ok: #34D399; --warn: #FBBF24; --err: #F87171;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--t1); -webkit-font-smoothing: antialiased; }

    /* ── Topbar — matches all admin pages exactly ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 64px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar img { height: 20px; filter: var(--logo-filter); display: block; }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .topbar-title {
      font-family: var(--display); font-size: 0.95rem; font-weight: 700;
      color: var(--t1); letter-spacing: -0.01em;
    }
    .topbar-title span { color: var(--orange); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .back-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--s2); color: var(--t2);
      font-family: var(--font); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { background: var(--s3); color: var(--t1); border-color: var(--border); }
    .back-btn.active { background: var(--o-dim); border-color: rgba(249,103,2,0.3); color: var(--o-text); }
    .back-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .topbar-sep-v { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

    /* Keep .btn for the Refresh button */
    .btn { height: 32px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--s2); color: var(--t1); font-size: 0.78rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; font-family: var(--font); }
    .btn:hover { border-color: var(--orange); color: var(--orange); }
    .btn.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    .btn.primary:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Layout ── */
    .page { max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }
    .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── KPI Grid ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; position: relative; overflow: hidden; transition: border-color 0.15s; }
    .kpi-card:hover { border-color: rgba(249,103,2,0.3); }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; }
    .kpi-card.banking::before { background: var(--orange); }
    .kpi-card.telco::before { background: var(--teal); }
    .kpi-card.government::before { background: var(--indigo); }
    .kpi-label { font-size: 0.68rem; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.6rem; font-weight: 800; font-family: var(--mono); line-height: 1.1; }
    .kpi-value.banking { color: var(--orange); }
    .kpi-value.telco { color: var(--teal); }
    .kpi-value.government { color: var(--indigo); }
    .kpi-value.warn { color: var(--warn); }
    .kpi-value.crit { color: var(--err); }
    .kpi-status { font-size: 0.65rem; margin-top: 4px; color: var(--t3); }
    .kpi-loading { height: 28px; background: var(--s2); border-radius: 4px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* ── Summary ── */
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 28px; }
    .summary-content { font-size: 0.9rem; line-height: 1.8; color: var(--t1); white-space: pre-wrap; min-height: 80px; }
    .summary-content.loading { color: var(--t3); font-style: italic; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--orange); vertical-align: text-bottom; animation: blink 0.9s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Alert Table ── */
    .alerts-list { display: flex; flex-direction: column; gap: 8px; }
    .alert-row { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; border-left-width: 3px; }
    .alert-row.critical { border-left-color: var(--err); }
    .alert-row.warning { border-left-color: var(--warn); }
    .alert-row.info { border-left-color: var(--teal); }
    .alert-sev { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 1px; }
    .alert-sev.critical { background: rgba(248,113,113,0.12); color: var(--err); }
    .alert-sev.warning { background: rgba(251,191,36,0.12); color: var(--warn); }
    .alert-row .alert-body { flex: 1; min-width: 0; }
    .alert-title { font-size: 0.83rem; font-weight: 600; margin-bottom: 2px; }
    .alert-detail { font-size: 0.74rem; color: var(--t3); font-family: var(--mono); }
    .alert-domain { font-size: 0.62rem; padding: 1px 6px; border-radius: 5px; font-weight: 700; margin-left: auto; flex-shrink: 0; align-self: flex-start; }
    .alert-domain.banking { background: var(--o-dim); color: var(--orange); }
    .alert-domain.telco { background: var(--t-dim); color: var(--teal); }
    .alert-domain.government { background: var(--i-dim); color: var(--indigo); }

    .empty-state { text-align: center; padding: 40px; color: var(--t3); font-size: 0.85rem; }
    .spin { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="topbar">
  <a href="/"><img src="/static/cloudera-logo.png" alt="Cloudera"/></a>
  <div class="topbar-sep"></div>
  <div class="topbar-title">Enterprise <span>Assistant</span> — Dashboard</div>
  <div class="topbar-right">
    <button class="back-btn" id="btnRefresh" onclick="runDashboard()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span id="btnRefreshLabel">Refresh</span>
    </button>
    <div class="topbar-sep-v"></div>
    <a class="back-btn" href="/">Chat</a>
    <a class="back-btn" href="/explorer">Data Explorer</a>
    <a class="back-btn" href="/upload">Upload</a>
    <a class="back-btn" href="/metrics">Metrics</a>
    <a class="back-btn" href="/presentation">Slides</a>
    <a class="back-btn" href="/setup">Status</a>
    <a class="back-btn" href="/configure">Settings</a>
    <a class="back-btn active" href="/dashboard">Dashboard</a>
    <button class="back-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>
</div>

<div class="page">
  <!-- KPI Grid -->
  <div class="section-title">Live KPIs — All Domains</div>
  <div class="kpi-grid" id="kpiGrid">
    <!-- populated by JS -->
  </div>

  <!-- Executive Summary -->
  <div class="section-title">AI Executive Briefing</div>
  <div class="summary-card">
    <div class="summary-content loading" id="summaryContent">Loading executive briefing…</div>
  </div>

  <!-- Alerts -->
  <div class="section-title" id="alertsTitle">Threshold Alerts</div>
  <div class="alerts-list" id="alertsList">
    <div class="empty-state">Click Refresh to run monitoring checks</div>
  </div>
</div>

<script>
const KPI_META = {
  banking_npl_pct:          { label:'Overall NPL Rate', unit:'%', domain:'banking', warn:5, crit:10, lo:true },
  banking_outstanding_t:    { label:'Total Outstanding', unit:'T IDR', domain:'banking' },
  banking_branch_achievement:{ label:'Branch Achievement', unit:'%', domain:'banking', warn:85, crit:70, lo:true },
  banking_high_npl_cities:  { label:'Cities NPL > 8%', unit:'cities', domain:'banking', warn:3, crit:6 },
  banking_kur_avg_approval: { label:'Avg KUR Approval', unit:'%', domain:'banking', warn:65, crit:50, lo:true },
  telco_revenue_at_risk:    { label:'Revenue at Risk', unit:'M IDR/mo', domain:'telco', warn:50, crit:150 },
  telco_critical_networks:  { label:'Critical Stations', unit:'stations', domain:'telco', warn:1, crit:3 },
  telco_avg_latency:        { label:'Avg Latency', unit:'ms', domain:'telco', warn:50, crit:80 },
  telco_sla_breach_total:   { label:'SLA Breaches (3mo)', unit:'incidents', domain:'telco', warn:10, crit:30 },
  telco_high_churn_count:   { label:'High-Risk Churners', unit:'subscribers', domain:'telco', warn:10, crit:25 },
  gov_budget_absorption:    { label:'Q4 Budget Absorption', unit:'%', domain:'government', warn:70, crit:50, lo:true },
  gov_min_satisfaction:     { label:'Min IKM Satisfaction', unit:'%', domain:'government', warn:84, crit:80, lo:true },
  gov_total_pending:        { label:'Pending Applications', unit:'apps', domain:'government', warn:200, crit:500 },
};

function getSeverity(key, val) {
  const m = KPI_META[key];
  if (!m || val == null) return 'normal';
  const v = parseFloat(val);
  if (m.lo) {
    if (m.crit && v < m.crit) return 'crit';
    if (m.warn && v < m.warn) return 'warn';
  } else {
    if (m.crit && v > m.crit) return 'crit';
    if (m.warn && v > m.warn) return 'warn';
  }
  return 'normal';
}

function renderKPIs(kpis) {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';
  for (const [key, data] of Object.entries(kpis)) {
    const m = KPI_META[key] || {};
    const sev = getSeverity(key, data.value);
    const card = document.createElement('div');
    card.className = `kpi-card ${m.domain || 'banking'}`;
    const valClass = sev === 'crit' ? 'crit' : sev === 'warn' ? 'warn' : (m.domain || 'banking');
    const valStr = data.value != null ? Number(data.value).toLocaleString(undefined, {maximumFractionDigits:2}) : '—';
    card.innerHTML = `
      <div class="kpi-label">${data.label || m.label || key}</div>
      <div class="kpi-value ${valClass}">${valStr}<span style="font-size:0.7rem;font-weight:500;opacity:0.7;margin-left:3px">${m.unit||''}</span></div>
      <div class="kpi-status">${sev==='crit'?'⚠ Critical':sev==='warn'?'△ Warning':'✓ Normal'}</div>
    `;
    grid.appendChild(card);
  }
}

function renderAlerts(alerts) {
  const list = document.getElementById('alertsList');
  const title = document.getElementById('alertsTitle');
  if (!alerts.length) {
    list.innerHTML = '<div class="empty-state">✓ No threshold breaches detected</div>';
    title.innerHTML = 'Threshold Alerts <span style="font-size:0.7rem;color:var(--ok);font-weight:500;text-transform:none;letter-spacing:0">— all clear</span>';
    return;
  }
  alerts.sort((a,b) => (a.severity==='critical'?0:1)-(b.severity==='critical'?0:1));
  title.innerHTML = `Threshold Alerts <span style="font-size:0.7rem;color:var(--warn);font-weight:500;text-transform:none;letter-spacing:0">— ${alerts.length} active</span>`;
  list.innerHTML = alerts.map(a => `
    <div class="alert-row ${a.severity}">
      <span class="alert-sev ${a.severity}">${a.severity}</span>
      <div class="alert-body">
        <div class="alert-title">${a.entity}</div>
        <div class="alert-detail">${a.check}: ${a.value} ${a.unit}</div>
      </div>
      <span class="alert-domain ${a.domain}">${a.domain}</span>
    </div>
  `).join('');
}

async function* sseGet(url) {
  const resp = await fetch(url);
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    const blocks = buf.split('\n\n'); buf = blocks.pop();
    for (const block of blocks) {
      if (!block.trim()) continue;
      let ev = 'message', data = null;
      for (const line of block.split('\n')) {
        if (line.startsWith('event: ')) ev = line.slice(7).trim();
        else if (line.startsWith('data: ')) data = JSON.parse(line.slice(6));
      }
      if (data !== null) yield {event: ev, data};
    }
  }
}

async function* ssePost(url, body) {
  const resp = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    const blocks = buf.split('\n\n'); buf = blocks.pop();
    for (const block of blocks) {
      if (!block.trim()) continue;
      let ev = 'message', data = null;
      for (const line of block.split('\n')) {
        if (line.startsWith('event: ')) ev = line.slice(7).trim();
        else if (line.startsWith('data: ')) data = JSON.parse(line.slice(6));
      }
      if (data !== null) yield {event: ev, data};
    }
  }
}

async function runDashboard() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  document.getElementById('btnRefreshLabel').textContent = 'Loading…';

  // 1. Load KPIs
  try {
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = Array(13).fill('<div class="kpi-card"><div class="kpi-loading" style="margin-bottom:8px;width:60%"></div><div class="kpi-loading" style="width:80%"></div></div>').join('');
    const resp = await fetch('/api/dashboard/kpis');
    const {kpis} = await resp.json();
    renderKPIs(kpis);

    // 2. LLM Executive Summary (streaming)
    const summary = document.getElementById('summaryContent');
    summary.className = 'summary-content';
    summary.innerHTML = '<span class="cursor"></span>';
    let text = '';
    for await (const ev of ssePost('/api/dashboard/summary', {kpis})) {
      if (ev.event === 'token') { text += ev.data.text; summary.innerHTML = text + '<span class="cursor"></span>'; }
      else if (ev.event === 'done') { summary.innerHTML = text; }
    }
  } catch(e) {
    document.getElementById('summaryContent').textContent = 'Failed to load: ' + e.message;
  }

  // 3. Monitoring alerts (streaming)
  const allAlerts = [];
  document.getElementById('alertsList').innerHTML = '<div class="empty-state"><div class="spin" style="margin:0 auto 8px"></div>Running threshold checks…</div>';
  try {
    for await (const ev of ssePost('/api/monitor/run', {})) {
      if (ev.event === 'monitor_check_done') allAlerts.push(...(ev.data.alerts || []));
      if (ev.event === 'monitor_done') renderAlerts(allAlerts);
    }
  } catch(e) {
    document.getElementById('alertsList').innerHTML = '<div class="empty-state">Monitoring failed: ' + e.message + '</div>';
  }

  btn.disabled = false;
  document.getElementById('btnRefreshLabel').textContent = 'Refresh';
}

function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('cld-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
}
// Sync theme icon on load
document.addEventListener('DOMContentLoaded', function() {
  var t = document.documentElement.getAttribute('data-theme');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
});

// Auto-run on load
runDashboard();
</script>
</body>
</html>

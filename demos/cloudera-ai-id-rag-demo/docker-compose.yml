services:
  app:
    # Build from local source (includes MinIO + Nessie + Trino in one container)
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudera-rag-demo:local
    container_name: cloudera-rag-demo

    ports:
      - "8080:8080"

    # Load LLM credentials from a local .env file (copy .env.example → .env and fill in)
    env_file:
      - path: .env
        required: false   # container starts even without .env; configure via /configure wizard

    environment:
      # Override individual vars here or in .env
      # LLM_PROVIDER: openai
      # LLM_BASE_URL: https://api.openai.com/v1
      # LLM_API_KEY: sk-...
      # LLM_MODEL_ID: gpt-4o
      PORT: "8080"

    # Persist vector store and MinIO data between restarts
    volumes:
      - vector-store:/app/data/vector_store
      - minio-data:/data/minio

    # Liveness + readiness probes (matches Cloudera AI Applications behaviour)
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s   # Trino takes up to 5 min on first boot

    restart: unless-stopped

    # Resource limits — matches the recommended CML Application profile
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

volumes:
  vector-store:
    driver: local
  minio-data:
    driver: local

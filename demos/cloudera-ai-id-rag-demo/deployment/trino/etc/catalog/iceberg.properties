# Iceberg connector — Nessie REST catalog + MinIO / Ozone S3 storage
connector.name=iceberg

# Nessie as the Iceberg REST catalog
# On a real CDP cluster replace with: https://nessie.cdp.company.com/iceberg/v1
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://localhost:19120/iceberg/v1
iceberg.rest-catalog.warehouse=s3://rag-warehouse/

# Native S3 filesystem (Trino 429+)
# On a real CDP cluster replace endpoint with the Ozone S3 Gateway URL
fs.native-s3.enabled=true
s3.endpoint=http://localhost:9000
s3.region=us-east-1
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true

# Default table format
iceberg.file-format=PARQUET

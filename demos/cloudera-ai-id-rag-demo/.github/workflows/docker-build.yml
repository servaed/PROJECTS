name: Build & Push Docker Image

on:
  push:
    branches: [main, master]
    tags:     ["v*.*.*"]
    paths:
      - "demos/cloudera-ai-id-rag-demo/**"   # only trigger when this demo changes
  pull_request:
    branches: [main, master]
    paths:
      - "demos/cloudera-ai-id-rag-demo/**"
  workflow_dispatch:                          # allow manual trigger from GitHub UI

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloudera-ai-id-rag-demo
  DEMO_DIR:   demos/cloudera-ai-id-rag-demo

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name (master → :master)
            type=ref,event=branch
            # Semver releases (v1.2.3 → :1.2.3 and :1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest on default branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            # Short SHA on every push (useful for rollback)
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:  ${{ env.DEMO_DIR }}
          file:     ${{ env.DEMO_DIR }}/Dockerfile
          push:     ${{ github.event_name != 'pull_request' }}
          tags:     ${{ steps.meta.outputs.tags }}
          labels:   ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
